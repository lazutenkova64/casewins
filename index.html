<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Telegram Web</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-color: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #232323;
            --bg-chat: #0b0b0b;
            --bg-input: #1f1f1f;
            --bg-search: #1f1f1f;
            --bg-hover: #2a2a2a;
            --bg-header: #121212;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --text-hint: #6c6c70;
            --accent-blue: #007aff;
            --accent-blue-hover: #005fc7;
            --accent-green: #34c759;
            --accent-red: #ff3b30;
            --accent-gray: #8e8e93;
            --message-out: #007aff;
            --message-in: #1e1e1e;
            --border-color: rgba(255, 255, 255, 0.1);
            --border-light: rgba(255, 255, 255, 0.05);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --unread-badge: #007aff;
            --divider: rgba(255, 255, 255, 0.1);
            --online-green: #34c759;
            --offline-gray: #8e8e93;
            --dnd-red: #ff3b30;
            --status-sent: #8e8e93;
            --status-delivered: #8e8e93;
            --status-read: #007aff;
            --tester-badge: #34c759;
            --header-height: 60px;
            --input-height: 70px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100%;
            overflow: hidden;
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        ::-webkit-scrollbar {
            width: 0;
            height: 0;
            background: transparent;
        }

        .app-container {
            display: flex;
            height: 100%;
            width: 100%;
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
        }

        /* Боковая панель */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 100%;
            background-color: var(--bg-color);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: none;
            max-width: 100%;
        }

        .sidebar.active {
            transform: translateX(0);
        }

        @media (min-width: 769px) {
            .sidebar {
                position: relative;
                transform: none;
                width: 360px;
                max-width: 360px;
                border-right: 1px solid var(--border-color);
                background-color: var(--bg-color);
            }
        }

        /* Шапка профиля */
        .sidebar-header {
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border-light);
            height: var(--header-height);
            flex-shrink: 0;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            flex-shrink: 0;
            color: white;
        }

        .avatar:active {
            opacity: 0.8;
        }

        .profile-info {
            flex: 1;
            min-width: 0;
        }

        .profile-name {
            font-weight: 600;
            font-size: 17px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
        }

        .profile-status {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .online-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--online-green);
            border-radius: 50%;
        }

        .offline-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--offline-gray);
            border-radius: 50%;
        }

        .dnd-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--dnd-red);
            border-radius: 50%;
        }

        .dnd-badge {
            background-color: var(--dnd-red);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 600;
        }

        .admin-badge {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: #000;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 700;
            margin-left: 6px;
            display: inline-block;
        }

        .tester-badge {
            background-color: var(--tester-badge);
            color: #000;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 700;
            margin-left: 6px;
            display: inline-block;
        }

        /* Табы */
        .tabs {
            display: flex;
            padding: 8px 12px;
            gap: 4px;
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
        }

        .tab {
            flex: 1;
            padding: 8px 0;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            text-align: center;
        }

        .tab.active {
            background-color: var(--accent-blue);
            color: white;
        }

        .tab:active {
            background-color: var(--bg-hover);
        }

        /* Поиск */
        .search-bar {
            padding: 8px 12px;
            position: relative;
            background-color: var(--bg-header);
            flex-shrink: 0;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--bg-search);
            border: none;
            border-radius: 28px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: background-color 0.2s;
        }

        .search-bar input::placeholder {
            color: var(--text-hint);
        }

        .search-bar input:focus {
            background-color: var(--bg-tertiary);
        }

        .create-chat-btn {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background-color: var(--accent-blue);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            font-weight: 400;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.2s;
            box-shadow: none;
        }

        .create-chat-btn:active {
            background-color: var(--accent-blue-hover);
        }

        /* Список чатов */
        .chats-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background-color: var(--bg-color);
            padding: 4px 0;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            cursor: pointer;
            transition: background-color 0.2s;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            background-color: transparent;
            min-height: 72px;
        }

        .chat-item:active {
            background-color: var(--bg-hover);
        }

        .chat-item.active {
            background-color: var(--bg-tertiary);
        }

        .chat-avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background-color: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 22px;
            flex-shrink: 0;
            color: white;
            box-shadow: none;
        }

        .chat-details {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-name {
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.online {
            background-color: var(--online-green);
        }

        .status-dot.offline {
            background-color: var(--offline-gray);
        }

        .status-dot.dnd {
            background-color: var(--dnd-red);
        }

        .last-seen {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .chat-last-message {
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .chat-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            flex-shrink: 0;
            margin-left: 4px;
        }

        .chat-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .chat-unread {
            background-color: var(--unread-badge);
            color: white;
            font-size: 12px;
            font-weight: 600;
            min-width: 22px;
            height: 22px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
        }

        .lock-icon {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .hidden-messages {
            font-style: italic;
            color: var(--text-secondary);
        }

        /* Основная область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-chat);
            width: 100%;
            min-width: 0;
            height: 100%;
            position: relative;
        }

        /* Шапка чата - фиксированная */
        .chat-header {
            padding: 8px 12px;
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 12px;
            height: var(--header-height);
            flex-shrink: 0;
            z-index: 10;
            position: sticky;
            top: 0;
            width: 100%;
        }

        .back-button {
            display: none;
            background: none;
            border: none;
            color: var(--accent-blue);
            font-size: 28px;
            cursor: pointer;
            padding: 8px 4px;
            -webkit-tap-highlight-color: transparent;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .back-button.mobile-visible {
            display: flex;
        }

        .back-button:active {
            background-color: var(--bg-hover);
        }

        .chat-avatar-small {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 500;
            flex-shrink: 0;
            color: white;
            cursor: pointer;
        }

        .chat-avatar-small:active {
            opacity: 0.8;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
            cursor: pointer;
        }

        .chat-info:active {
            opacity: 0.8;
        }

        .chat-title {
            font-weight: 600;
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .chat-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-actions {
            display: flex;
            gap: 2px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--accent-blue);
            font-size: 22px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: background-color 0.2s;
            -webkit-tap-highlight-color: transparent;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:active {
            background-color: var(--bg-hover);
        }

        /* Контейнер сообщений */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            background-color: var(--bg-chat);
            will-change: transform;
        }

        /* Сообщения */
        .message {
            max-width: 85%;
            display: flex;
            flex-direction: column;
            position: relative;
            opacity: 1;
            transform: none;
            animation: none;
            cursor: pointer;
            transition: opacity 0.1s ease;
        }

        .message.out {
            align-self: flex-end;
        }

        .message.in {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 16px;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
            max-width: 100%;
            transition: background-color 0.1s ease;
        }

        .message.out .message-bubble {
            background-color: var(--message-out);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.in .message-bubble {
            background-color: var(--message-in);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-blue);
            margin-bottom: 2px;
            margin-left: 6px;
        }

        .message-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 2px;
            margin-right: 4px;
        }

        .message.out .message-footer {
            margin-right: 0;
        }

        .message-time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
        }

        .message.in .message-time {
            color: var(--text-secondary);
        }

        .message-status {
            font-size: 12px;
            display: flex;
            align-items: center;
        }

        .status-icon {
            font-size: 14px;
            transition: color 0.1s ease;
        }

        .status-icon.sent {
            color: var(--status-sent);
        }

        .status-icon.delivered {
            color: var(--status-sent);
        }

        .status-icon.read {
            color: var(--status-read);
        }

        .status-icon.pending {
            color: var(--status-sent);
            animation: pulse 1s infinite;
        }

        /* Меню действий над сообщением */
        .message-actions {
            position: absolute;
            top: -40px;
            right: 0;
            display: none;
            gap: 8px;
            background-color: var(--bg-tertiary);
            padding: 6px 12px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            z-index: 20;
        }

        .message-actions.visible {
            display: flex;
        }

        /* Для ПК показываем при наведении */
        @media (min-width: 769px) {
            .message:hover .message-actions {
                display: flex;
            }
        }

        .message-action-btn {
            background: none;
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 20px;
            transition: background-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .message-action-btn:active {
            background-color: var(--bg-hover);
        }

        .message-action-btn.delete:active {
            background-color: var(--dnd-red);
        }

        /* Поле ввода - фиксированное снизу */
        .message-input-container {
            padding: 10px 12px;
            background-color: var(--bg-header);
            border-top: 1px solid var(--border-light);
            display: flex !important;
            gap: 8px;
            align-items: center;
            min-height: var(--input-height);
            flex-shrink: 0;
            z-index: 10;
            position: sticky;
            bottom: 0;
            width: 100%;
            visibility: visible !important;
            opacity: 1 !important;
        }

        .emoji-toggle-btn {
            background: none;
            border: none;
            color: var(--accent-blue);
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: background-color 0.2s;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
            width: 48px;
            height: 48px;
            display: flex !important;
            align-items: center;
            justify-content: center;
            visibility: visible !important;
            opacity: 1 !important;
        }

        .emoji-toggle-btn:active {
            background-color: var(--bg-hover);
        }

        .mic-btn {
            background: none;
            border: none;
            color: var(--accent-blue);
            font-size: 22px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: all 0.2s;
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            display: flex !important;
            align-items: center;
            justify-content: center;
            user-select: none;
            visibility: visible !important;
            opacity: 1 !important;
        }

        .mic-btn.recording {
            color: white;
            background-color: var(--dnd-red);
            animation: pulse-recording 1s infinite;
        }

        .mic-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        @keyframes pulse-recording {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }

        .message-input {
            width: 100%;
            padding: 14px 18px;
            background-color: var(--bg-input);
            border: none;
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            resize: none;
            max-height: 120px;
            min-height: 48px;
            line-height: 1.4;
        }

        .message-input::placeholder {
            color: var(--text-hint);
        }

        .send-btn {
            background-color: var(--accent-blue);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex !important;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            font-size: 20px;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.2s;
            box-shadow: none;
            visibility: visible !important;
            opacity: 1 !important;
        }

        .send-btn:active {
            background-color: var(--accent-blue-hover);
        }

        .send-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* Эмодзи пикер */
        .emoji-picker {
            display: flex;
            gap: 8px;
            padding: 12px;
            background-color: var(--bg-tertiary);
            border-radius: 30px;
            border: 1px solid var(--border-color);
            margin-bottom: 8px;
            flex-wrap: wrap;
            justify-content: center;
            animation: slideDown 0.2s ease;
            max-height: 200px;
            overflow-y: auto;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .emoji-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            padding: 8px;
            transition: transform 0.1s;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .emoji-btn:active {
            transform: scale(1.2);
            background-color: var(--bg-hover);
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: var(--bg-tertiary);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content h2 {
            margin-bottom: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);

        .auth-tabs {

            padding: 12px;
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .auth-tab.active {
            background-color: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .modal-input {
            width: 100%;
            padding: 16px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }

        .modal-input:focus {
            border-color: var(--accent-blue);
        }

        .modal-btn {
            background-color: var(--accent-blue);
            border: none;
            color: white;
            padding: 16px;
            border-radius: 20px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 8px;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.2s;
        }

        .modal-btn:active {
            background-color: var(--accent-blue-hover);
        }

        .modal-btn.secondary {
            background-color: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .modal-btn.secondary:active {
            background-color: var(--bg-hover);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 32px;
            cursor: pointer;
            float: right;
            line-height: 1;
            padding: 0 8px;
            -webkit-tap-highlight-color: transparent;
            transition: color 0.2s;
        }

        .close-btn:active {
            color: var(--text-primary);
        }

        .password-input-container {
            position: relative;
            margin-bottom: 16px;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 20px;
            transition: color 0.2s;
        }

        .toggle-password:active {
            color: var(--text-primary);
        }

        .remember-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 15px;
        }

        .delete-chat-btn {
            background-color: var(--dnd-red);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 8px;
            transition: background-color 0.2s;
        }

        .delete-chat-btn:active {
            background-color: #d63026;
        }

        .chat-deleted-message {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* Медиа вьюер */
        .media-viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: black;
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        .media-viewer.active {
            display: flex;
        }

        .media-viewer-content {
            max-width: 100%;
            max-height: 100%;
        }

        .media-viewer-content img,
        .media-viewer-content video {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
        }

        .media-viewer-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: white;
            font-size: 40px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            z-index: 3001;
        }

        .media-viewer-close:active {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Аватар грид */
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
        }

        .avatar-option {
            font-size: 40px;
            background-color: var(--bg-input);
            border: 2px solid transparent;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            margin: 0 auto;
        }

        .avatar-option:active {
            transform: scale(1.1);
        }

        .avatar-option.selected {
            border-color: var(--accent-blue);
        }

        /* Пустые состояния */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* Аудио сообщения */
        .audio-player {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 200px;
        }

        .play-pause-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--accent-blue);
            border: none;
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .play-pause-btn:active {
            opacity: 0.8;
        }

        .audio-progress {
            flex: 1;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .audio-progress-fill {
            height: 100%;
            background-color: white;
            border-radius: 2px;
            width: 0%;
        }

        .audio-time {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 45px;
        }

        /* Профиль пользователя */
        .user-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 20px 0;
        }

        .user-profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 500;
            color: white;
        }

        .user-profile-name {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .user-profile-bio {
            font-size: 16px;
            color: var(--text-secondary);
            text-align: center;

        }

        .user-profile-status {
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

                loadFromStorage();
                
                // Настраиваем обработчики
                populateEmojiPicker();
                
                // Проверяем сессию

                if (hasSession) {

                    // Загружаем данные

                        loadUnreadCounts(),

                    ]);
                    
                    // Инициализируем подключения
                    initAbly();
                    startHeartbeat();
                    startPresenceUpdates();
                    startStatusUpdates();
                    
                    // Проверяем URL

        // ========== Загрузка непрочитанных ==========
        async function loadUnreadCounts() {
            if (!currentUser) return;
            
            try {
                const { data, error } = await supabaseClient
                    .from('messages')
                    .select('chat_id')
                    .eq('read', false)
                    .neq('sender_id', currentUser.id);
                
                if (error) throw error;
                
                const counts = {};
                data.forEach(msg => {
                    counts[msg.chat_id] = (counts[msg.chat_id] || 0) + 1;
                });
                
                unreadCounts = counts;
                localStorage.setItem('unreadCounts', JSON.stringify(unreadCounts));

        // ========== Загрузка статусов сообщений ==========
        async function loadMessageStatuses() {
            if (!currentUser) return;
            
            try {
                const { data, error } = await supabaseClient
                    .from('messages')
                    .select('id, delivered, read')
                    .eq('sender_id', currentUser.id);
                
                if (error) throw error;
                
                data.forEach(msg => {
                    messageStatuses[msg.id] = {
                        status: msg.read ? 'read' : (msg.delivered ? 'delivered' : 'sent'),
                        deliveredAt: msg.delivered ? Date.now() : null,
                        readAt: msg.read ? Date.now() : null
                    };
                });
                
                localStorage.setItem('messageStatuses', JSON.stringify(messageStatuses));
                
            } catch (err) {
                console.error('Error loading message statuses:', err);
            }

        // ========== Форматирование времени последнего визита ==========
        function formatLastSeen(timestamp) {
            if (!timestamp) return 'давно';
            
            const now = Date.now();
            const diff = now - timestamp;
            
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            
            if (seconds < 60) return 'только что';
            if (minutes < 60) {
                if (minutes === 1) return '1 минуту назад';
                if (minutes >= 2 && minutes <= 4) return `${minutes} минуты назад`;
                return `${minutes} минут назад`;
            }
            if (hours < 24) {
                if (hours === 1) return '1 час назад';
                if (hours >= 2 && hours <= 4) return `${hours} часа назад`;
                return `${hours} часов назад`;
            }
            if (days === 1) return 'вчера';
            if (days < 7) {
                if (days >= 2 && days <= 4) return `${days} дня назад`;
                return `${days} дней назад`;
            }
            
            // Форматируем как дату для старых сообщений
            const date = new Date(timestamp);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (date.toDateString() === today.toDateString()) {
                return `сегодня в ${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`;
            }
            if (date.toDateString() === yesterday.toDateString()) {
                return `вчера в ${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`;
            }
            
            return `${date.getDate()}.${date.getMonth() + 1}.${date.getFullYear()}`;
        }

        // ========== Загрузка публичных чатов ==========
        async function loadPublicChats() {

                const { data, error } = await supabaseClient
                    .from('chats')
                    .select('*')
                    .eq('type', 'public');
                
                if (error) {
                    console.error('Error loading chats:', error);
                    return;
                }
                
                publicChats = (data || []).map(chat => {
                    let members = [];
                    if (chat.members) {
                        if (typeof chat.members === 'string') {
                            try {
                                members = JSON.parse(chat.members);
                            } catch (e) {
                                members = [];
                            }
                        } else if (Array.isArray(chat.members)) {
                            members = chat.members;
                        }

                    return {
                        ...chat,
                        members: members
                    };
                });
                
                localStorage.setItem('publicChats', JSON.stringify(publicChats));
                if (currentTab === 'public') updateChatsList();
            } catch (err) {
                console.error('Error loading public chats:', err);

        // ========== Ably инициализация ==========
        function initAbly() {
            if (!currentUser) return;
            
            if (ably) {
                try {
                    ably.close();
                } catch (e) {}
            }
            
            ably = new Ably.Realtime({
                key: ABLY_API_KEY,
                clientId: currentUser.id.toString(),
                transports: ['web_socket'],
                disconnectedRetryTimeout: 1000,
                suspendedRetryTimeout: 2000,
                realtimeRequestTimeout: 5000,
                echoMessages: false
            });

            ably.connection.on('connected', () => {
                console.log('✅ Connected to Ably');
                
                const presenceChannel = ably.channels.get('presence');
                presenceChannel.presence.enter({ 
                    name: currentUser.name, 
                    avatar: currentUser.avatar || '👤',
                    bio: currentUser.bio || '',
                    isAdmin: currentUser.isAdmin,
                    isTester: currentUser.isTester,
                    dnd: currentUser.dnd || false,
                    lastSeen: Date.now()
                });
                
                presenceChannel.presence.subscribe('enter', (member) => {
                    if (member.clientId !== currentUser.id.toString()) {
                        onlineUsers[member.clientId] = {
                            id: parseInt(member.clientId),
                            name: member.data.name,
                            avatar: member.data.avatar || '👤',
                            bio: member.data.bio || '',
                            online: true,
                            isAdmin: member.data.isAdmin || false,
                            isTester: member.data.isTester || false,
                            dnd: member.data.dnd || false,
                            lastSeen: Date.now()
                        };
                        if (currentTab === 'users' || currentTab === 'chats') {
                            updateChatsList();
                        }
                        updateChatStatus();
                    }
                });
                
                presenceChannel.presence.subscribe('update', (member) => {
                    if (member.clientId !== currentUser.id.toString()) {
                        onlineUsers[member.clientId] = {
                            ...onlineUsers[member.clientId],
                            name: member.data.name,
                            avatar: member.data.avatar,
                            bio: member.data.bio,
                            isAdmin: member.data.isAdmin,
                            isTester: member.data.isTester,
                            dnd: member.data.dnd,
                            online: true,
                            lastSeen: Date.now()
                        };
                        if (currentTab === 'users' || currentTab === 'chats') {
                            updateChatsList();
                        }
                        updateChatStatus();
                    }
                });
                
                presenceChannel.presence.subscribe('leave', (member) => {
                    if (onlineUsers[member.clientId]) {
                        onlineUsers[member.clientId].online = false;
                        onlineUsers[member.clientId].lastSeen = Date.now();
                        if (currentTab === 'users' || currentTab === 'chats') {
                            updateChatsList();
                        }
                        updateChatStatus();
                    }
                });
                
                presenceChannel.presence.get((err, members) => {
                    if (members) {
                        members.forEach(member => {
                            if (member.clientId !== currentUser.id.toString()) {
                                onlineUsers[member.clientId] = {
                                    id: parseInt(member.clientId),
                                    name: member.data.name,
                                    avatar: member.data.avatar || '👤',
                                    bio: member.data.bio || '',
                                    online: true,
                                    isAdmin: member.data.isAdmin || false,
                                    isTester: member.data.isTester || false,
                                    dnd: member.data.dnd || false,
                                    lastSeen: Date.now()
                                };
                            }
                        });
                    }
                    if (currentTab === 'users' || currentTab === 'chats') {
                        updateChatsList();
                    }
                });

                const globalChatsChannel = ably.channels.get('global-chats');
                globalChatsChannel.subscribe('new-chat', (message) => {
                    const newChat = message.data;
                    if (!publicChats.find(c => c.id === newChat.id)) {
                        publicChats.push(newChat);
                        localStorage.setItem('publicChats', JSON.stringify(publicChats));
                        if (currentTab === 'public') updateChatsList();
                    }
                });

                const adminChannel = ably.channels.get('admin-actions');
                adminChannel.subscribe('delete-chat', (message) => {
                    const { chatId } = message.data;
                    publicChats = publicChats.filter(c => c.id !== chatId);
                    localStorage.setItem('publicChats', JSON.stringify(publicChats));
                    myChats = myChats.filter(c => c.id !== chatId);
                    localStorage.setItem(`myChats_${currentUser.id}`, JSON.stringify(myChats));
                    if (messages[chatId]) {
                        delete messages[chatId];
                        saveMessagesDebounced();
                    }
                    if (currentChat && currentChat.id === chatId) {
                        currentChat = null;
                        document.getElementById('messagesContainer').innerHTML = '<div class="chat-deleted-message">⚠️ Чат был удален</div>';
                        document.getElementById('currentChatName').innerHTML = 'Чат удален';
                        document.getElementById('chatStatus').innerHTML = '';
                        updateUrlWithChat(null);
                    }
                    updateChatsList();
                });

                adminChannel.subscribe('delete-message', (message) => {
                    const { chatId, messageId } = message.data;
                    if (!deletedMessages[chatId]) deletedMessages[chatId] = [];
                    if (!deletedMessages[chatId].includes(messageId)) {
                        deletedMessages[chatId].push(messageId);
                        localStorage.setItem('deletedMessages', JSON.stringify(deletedMessages));
                    }
                    if (messages[chatId]) {
                        messages[chatId] = messages[chatId].filter(m => m.id !== messageId);
                        saveMessagesDebounced();
                        if (currentChat && currentChat.id === chatId) renderMessages();
                        updateChatsList();
                    }
                });

                // Подписываемся на все чаты пользователя
                myChats.forEach(chat => subscribeToChat(chat));
            });

            ably.connection.on('disconnected', () => {
                console.log('⚠️ Disconnected from Ably, reconnecting...');
                setTimeout(() => {
                    if (currentUser && ably.connection.state !== 'connected') {
                        ably.connection.connect();
                    }
                }, 1000);
            });

            ably.connection.on('suspended', () => {
                console.warn('⚠️ Connection suspended, will retry...');
            });

            ably.connection.on('failed', (err) => {
                console.error('❌ Connection failed:', err);
                if (reconnectTimeout) clearTimeout(reconnectTimeout);
                reconnectTimeout = setTimeout(() => {
                    if (currentUser) initAbly();
                }, 5000);
            });
        }

        // ========== Обновление статуса текущего чата ==========
        function updateChatStatus() {
            if (!currentChat || currentChat.isSelf) return;
            
            const chatMemberId = currentChat.members?.find(id => id !== currentUser.id);
            if (!chatMemberId) return;
            
            const userOnline = onlineUsers[chatMemberId.toString()];
            const statusElement = document.getElementById('chatStatus');
            
            if (userOnline && userOnline.online) {
                if (userOnline.dnd) {
                    statusElement.innerHTML = '<span class="dnd-indicator"></span> не беспокоит';
                } else {
                    statusElement.innerHTML = '<span class="online-indicator"></span> в сети';
                }
            } else {
                const lastSeen = userOnline?.lastSeen;
                if (lastSeen) {
                    statusElement.innerHTML = `был(а) ${formatLastSeen(lastSeen)}`;
                } else {
                    statusElement.innerHTML = 'был(а) давно';
                }
            }
        }

        // ========== Подписка на чат ==========
        function subscribeToChat(chat) {
            if (!ably || !chat) return;
            
            const chatChannel = ably.channels.get(`chat-${chat.id}`);
            chatChannel.unsubscribe();
            
            chatChannel.subscribe('message', (message) => {
                const msg = message.data;
                if (!msg) return;
                
                if (deletedMessages[chat.id] && deletedMessages[chat.id].includes(msg.id)) return;
                
                // Сохраняем в БД даже если пользователь не в сети
                saveMessageToDatabase(msg);
                
                if (!messages[chat.id]) messages[chat.id] = [];
                
                const exists = messages[chat.id].some(m => m.id === msg.id);
                if (!exists) {
                    messages[chat.id].push({
                        ...msg,
                        type: msg.sender == currentUser.id ? 'out' : 'in'
                    });
                    messages[chat.id].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                    
                    if (msg.sender != currentUser.id) {
                        sendDeliveryReceipt(chat.id, msg.id);
                        // Увеличиваем счетчик непрочитанных
                        if (currentChat?.id !== chat.id) {
                            unreadCounts[chat.id] = (unreadCounts[chat.id] || 0) + 1;
                            localStorage.setItem('unreadCounts', JSON.stringify(unreadCounts));
                        }
                    }
                    
                    saveMessagesDebounced();
                    
                    if (currentChat && currentChat.id === chat.id) {
                        renderMessages();
                        unreadCounts[chat.id] = 0;
                        localStorage.setItem('unreadCounts', JSON.stringify(unreadCounts));
                        markMessagesAsRead(chat.id);
                    }
                    
                    updateChatsList();
                }
            });
            
            chatChannel.subscribe('delivery_receipt', (data) => {
                const { messageId } = data.data;
                
                // Обновляем статус в БД
                updateMessageDeliveryStatus(messageId);
                
                if (messageStatuses[messageId]) {
                    messageStatuses[messageId].status = 'delivered';
                    messageStatuses[messageId].deliveredAt = Date.now();
                }
                saveMessagesDebounced();
                
                if (currentChat && currentChat.id === chat.id) {
                    renderMessages();
                }
            });
            
            chatChannel.subscribe('read_receipt', (data) => {
                const { messageId } = data.data;
                
                // Обновляем статус в БД
                updateMessageReadStatus(messageId);
                
                if (messageStatuses[messageId]) {
                    messageStatuses[messageId].status = 'read';
                    messageStatuses[messageId].readAt = Date.now();
                }
                saveMessagesDebounced();
                
                if (currentChat && currentChat.id === chat.id) {
                    renderMessages();
                }
            });
            
            chatChannel.subscribe('delete', (data) => {
                const { messageId } = data.data;
                
                // Удаляем из БД
                deleteMessageFromDatabase(messageId);
                
                if (!deletedMessages[chat.id]) deletedMessages[chat.id] = [];
                if (!deletedMessages[chat.id].includes(messageId)) {
                    deletedMessages[chat.id].push(messageId);
                    localStorage.setItem('deletedMessages', JSON.stringify(deletedMessages));
                }
                if (messages[chat.id]) {
                    messages[chat.id] = messages[chat.id].filter(m => m.id !== messageId);
                    saveMessagesDebounced();
                    if (currentChat?.id === chat.id) renderMessages();
                    updateChatsList();
                }
            });
            
            chatChannel.subscribe('edit', (data) => {
                const { messageId, newText } = data.data;
                
                // Обновляем в БД
                updateMessageInDatabase(messageId, newText);
                
                if (messages[chat.id]) {
                    const msgIndex = messages[chat.id].findIndex(m => m.id === messageId);
                    if (msgIndex !== -1) {
                        messages[chat.id][msgIndex].text = newText;
                        messages[chat.id][msgIndex].edited = true;
                        saveMessagesDebounced();
                        if (currentChat?.id === chat.id) renderMessages();
                    }
                }
            });
            
            // Загружаем историю сообщений
            loadChatHistory(chat.id);
        }

        // ========== Обновление статуса доставки в БД ==========
        async function updateMessageDeliveryStatus(messageId) {
            try {
                const { error } = await supabaseClient
                    .from('messages')
                    .update({ delivered: true, delivered_at: new Date().toISOString() })
                    .eq('id', messageId);

        // ========== Загрузка истории чата ==========
        async function loadChatHistory(chatId) {
            try {
                const thirtyDaysAgo = Date.now() - 30 * 24 * 60 * 60 * 1000;
                
                let query = supabaseClient
                    .from('messages')
                    .select('*')
                    .eq('chat_id', chatId)
                    .order('timestamp', { ascending: true });
                
                if (currentUser.name !== ADMIN_USERNAME) {
                    query = query.gte('timestamp', thirtyDaysAgo);
                }
                
                const { data, error } = await query;
                
                if (error) {
                    console.error('Ошибка загрузки истории:', error);
                    return;
                }
                
                if (data && data.length > 0) {
                    if (!messages[chatId]) messages[chatId] = [];
                    
                    data.forEach(msg => {
                        // Проверяем, не удалено ли сообщение
                        if (deletedMessages[chatId] && deletedMessages[chatId].includes(msg.id)) {
                            return;
                        }
                        
                        const existingMsg = messages[chatId].find(m => m.id === msg.id);
                        if (!existingMsg) {
                            messages[chatId].push({
                                ...msg,
                                type: msg.sender_id == currentUser.id ? 'out' : 'in'
                            });
                        }
                    });
                    
                    messages[chatId].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                    saveMessagesDebounced();
                    
                    if (currentChat && currentChat.id === chatId) {
                        renderMessages();
                    }
                }
            } catch (err) {
                console.error('Ошибка при загрузке истории:', err);
            }
        }

        // ========== Голосовые сообщения ==========
        function startRecording() {
            const messageInput = document.getElementById('messageInput');
            
            if (messageInput.value.trim().length > 0) {
                return;
            }
            
            if (isRecording) return;
            if (!currentChat) {
                alert('Сначала выберите чат');
                return;
            }
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert('Ваш браузер не поддерживает запись аудио');
                return;
            }
            
            recordingStartTime = Date.now();
            
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    mediaStream = stream;
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const duration = Math.round((Date.now() - recordingStartTime) / 1000);
                        
                        if (mediaStream) {
                            mediaStream.getTracks().forEach(track => track.stop());
                            mediaStream = null;
                        }
                        
                        if (audioBlob.size > 0 && duration > 1) {
                            sendAudioMessage(audioBlob, duration);
                        }
                        
                        document.getElementById('micBtn').classList.remove('recording');
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    document.getElementById('micBtn').classList.add('recording');
                    
                    recordingTimeout = setTimeout(() => {
                        if (isRecording) stopRecording();
                    }, 60000);
                })
                .catch(err => {
                    alert('Не удалось получить доступ к микрофону');
                    console.error(err);
                });
        }

        function stopRecording() {
            if (!isRecording) return;
            
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                
                if (recordingTimeout) {
                    clearTimeout(recordingTimeout);
                    recordingTimeout = null;
                }
            }
        }

        function cancelRecording() {
            if (!isRecording) return;
            
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('micBtn').classList.remove('recording');
                
                if (recordingTimeout) {
                    clearTimeout(recordingTimeout);
                    recordingTimeout = null;
                }
                
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                    mediaStream = null;
                }
            }
        }
