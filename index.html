<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Auth</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="background:#111;color:white;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;">

<div style="background:#1e1e1e;padding:30px;border-radius:12px;width:300px;">
<h2>Регистr="Пароль" style="width:100%;margin-bottom:10px;padding:8px;">
<button onclick="register()" style="width:100%;padding:8px;">Зарегистрироваться</button>

<hr>

<h2>Вход</h2>
<input id="loginEmail" placeholder="Email" style="width:100%;margin-bottom:10px;padding:8px;">
<input id="loginPassword" type="password" placeholder="Пароль" style="width:100%;margin-bottom:10px;padding:8px;">
<button onclick="login()" style="width:100%;padding:8px;">Войти</button>
</div>

<script>
const SUPABASE_URL = "https://olqwgfesedzrnpwfwqpa.supabase.co";
const SUPABASE_KEY = "sb_publishable_nuCZ7nbXGaseOjl8VIsKpA_-o1MEZlY";

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signUp({ email, password });

  if (error) {
    alert(error.message);
  } else {
    alert("Регистрация успешна!");
  }
}

async function login() {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  const { error } = await client.auth.signInWithPassword({ email, password });

  if (error) {
    alert(error.message);
  } else {
    alert("Вход выполнен!");
  }
}
</script>

</body>
</html>
