<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Tok App</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box {
    background:#1e1e1e;
    padding:30px;
    border-radius:12px;
    width:320px;
}

input {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:none;
    border-radius:6px;
}

button {
    width:100%;
    padding:10px;
    background:#2b9aff;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#1f7dd8;
}

.hidden {
    display:none;
}
</style>
</head>
<body>

<div class="box" id="authBox">
    <h2>Вход</h2>
    <input id="loginUsername" placeholder="Имя">
    <input id="loginPassword" type="password" placeholder="Пароль">
    <button id="loginBtn">Войти</button>

    <hr>

    <h2>Регистрация</h2>
    <input id="registerUsername" placeholder="Имя">
    <input id="registerPassword" type="password" placeholder="Пароль">
    <input id="registerConfirmPassword" type="password" placeholder="Подтвердите пароль">
    <button id="registerBtn">Зарегистрироваться</button>
</div>

<div class="box hidden" id="appBox">
    <h2>Вы вошли</h2>
    <p id="welcomeText"></p>
    <button id="logoutBtn">Выйти</button>
</div>

<script>
const SUPABASE_URL = "ВСТАВЬ_СЮДА_URL";
const SUPABASE_KEY = "ВСТАВЬ_СЮДА_ANON_KEY";

let supabase = null;
let currentUser = null;

document.addEventListener("DOMContentLoaded", () => {

    // Инициализация Supabase
    if (!window.supabase) {
        alert("Supabase не загрузился");
        return;
    }

    supabase = window.supabase.createClient(
        SUPABASE_URL.trim(),
        SUPABASE_KEY.trim()
    );

    console.log("Supabase подключен");

    // Навешиваем события
    document.getElementById("loginBtn").addEventListener("click", login);
    document.getElementById("registerBtn").addEventListener("click", register);
    document.getElementById("logoutBtn").addEventListener("click", logout);

    checkSession();
});

async function login() {

    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;

    if (!username || !password) {
        alert("Заполните поля");
        return;
    }

    try {
        const { data, error } = await supabase
            .from("users")
            .select("*")
            .eq("username", username)
            .eq("password", password)
            .single();

        if (error || !data) {
            alert("Неверный логин или пароль");
            return;
        }

        currentUser = data;
        localStorage.setItem("currentUser", JSON.stringify(data));
        showApp();

    } catch (err) {
        console.error("Login error:", err);
        alert("Ошибка входа");
    }
}

async function register() {

    const username = document.getElementById("registerUsername").value.trim();
    const password = document.getElementById("registerPassword").value;
    const confirm = document.getElementById("registerConfirmPassword").value;

    if (!username || !password) {
        alert("Заполните поля");
        return;
    }

    if (password !== confirm) {
        alert("Пароли не совпадают");
        return;
    }

    try {
        const { data: existing } = await supabase
            .from("users")
            .select("id")
            .eq("username", username);

        if (existing && existing.length > 0) {
            alert("Пользователь уже существует");
            return;
        }

        const { error } = await supabase
            .from("users")
            .insert([{ username, password }]);

        if (error) {
            alert("Ошибка регистрации");
            return;
        }

        alert("Регистрация успешна!");
    } catch (err) {
        console.error("Register error:", err);
        alert("Ошибка регистрации");
    }
}

function showApp() {
    document.getElementById("authBox").classList.add("hidden");
    document.getElementById("appBox").classList.remove("hidden");
    document.getElementById("welcomeText").innerText =
        "Привет, " + currentUser.username;
}

function logout() {
    localStorage.removeItem("currentUser");
    location.reload();
}

function checkSession() {
    const saved = localStorage.getItem("currentUser");
    if (saved) {
        currentUser = JSON.parse(saved);
        showApp();
    }
}
</script>

</body>
</html>
