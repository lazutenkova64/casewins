<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Web</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-primary: #0c0c0c;
            --bg-secondary: #141414;
            --bg-tertiary: #1e1e1e;
            --bg-glass: rgba(30, 30, 30, 0.7);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-blue: #2b9aff;
            --accent-green: #2b9a6b;
            --accent-purple: #9f7aea;
            --accent-red: #f56565;
            --accent-orange: #f6ad55;
            --border-color: #2a2a2a;
            --message-out: #1e4a7a;
            --message-in: #2a2a2a;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
            --unread-badge: #2b9aff;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --admin-gold: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            transition: background 0.2s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            max-width: none;
            margin: 0;
            background: radial-gradient(circle at 20% 30%, #1a1a2e, #0a0a0a);
        }

        .sidebar {
            width: 350px;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            box-shadow: var(--shadow);
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(to right, rgba(43, 154, 255, 0.1), transparent);
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }

        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .profile-info {
            flex: 1;
            min-width: 0;
        }

        .profile-name {
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .profile-status {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .online-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            margin-left: 6px;
            box-shadow: 0 0 10px var(--accent-green);
        }

        .dnd-badge {
            background: #f56565;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 6px;
        }

        .tabs {
            display: flex;
            padding: 16px 16px 12px;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(5px);
        }

        .tab.active {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .search-bar {
            padding: 12px 16px;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .search-bar input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(43, 154, 255, 0.2);
        }

        .create-chat-btn {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--gradient-1);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            -webkit-tap-highlight-color: transparent;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }

        .create-chat-btn:hover {
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 4px 15px rgba(43, 154, 255, 0.5);
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 8px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 16px;
            margin-bottom: 4px;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            background: transparent;
        }

        .chat-item:hover {
            background: var(--bg-glass);
            transform: translateX(4px);
        }

        .chat-item.active {
            background: linear-gradient(90deg, var(--bg-glass), transparent);
            border-left: 3px solid var(--accent-blue);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--gradient-2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }

        .chat-details {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-last-message {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            flex-shrink: 0;
        }

        .chat-time {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .chat-unread {
            background: var(--gradient-1);
            color: white;
            font-size: 11px;
            font-weight: 600;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            box-shadow: 0 2px 8px rgba(43, 154, 255, 0.3);
        }

        .lock-icon {
            font-size: 12px;
            margin-left: 4px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent;
            width: 100%;
            min-width: 0;
        }

        .chat-header {
            padding: 12px 20px;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-sm);
        }

        .back-button {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;
            -webkit-tap-highlight-color: transparent;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .back-button:hover {
            background: var(--bg-tertiary);
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-title {
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-actions {
            display: flex;
            gap: 4px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .action-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 75%;
            display: flex;
            flex-direction: column;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: messageAppear 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            will-change: transform, opacity;
        }

        @keyframes messageAppear {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.out {
            align-self: flex-end;
        }

        .message.in {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            box-shadow: var(--shadow-sm);
            position: relative;
            transition: all 0.2s;
        }

        .message.out .message-bubble {
            background: var(--gradient-1);
            border-bottom-right-radius: 4px;
            color: white;
        }

        .message.in .message-bubble {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .message-media {
            max-width: 300px;
            max-height: 300px;
            border-radius: 16px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .message-media:hover {
            transform: scale(1.02);
        }

        .audio-message {
            max-width: 280px;
            min-width: 200px;
            background: transparent;
            padding: 8px;
        }
        
        .audio-player {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 6px 12px;
        }
        
        .play-pause-btn {
            background: var(--accent-blue);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .play-pause-btn:hover {
            transform: scale(1.1);
        }
        
        .audio-progress {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        
        .audio-progress-fill {
            height: 100%;
            background: var(--accent-blue);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }
        
        .audio-time {
            font-size: 11px;
            color: var(--text-secondary);
            min-width: 35px;
            text-align: right;
        }

        .message-sender {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-blue);
            margin-bottom: 4px;
            margin-left: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .message-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 4px;
            margin-left: 8px;
        }

        .message-time {
            font-size: 10px;
            color: var(--text-secondary);
        }
        
        .message-status {
            font-size: 12px;
            display: flex;
            align-items: center;
        }
        
        .status-icon {
            font-size: 14px;
        }
        
        .status-pending {
            color: #aaa;
        }
        
        .status-sent {
            color: #aaa;
        }
        
        .status-delivered {
            color: var(--accent-blue);
        }
        
        .status-read {
            color: var(--accent-blue);
        }

        .message-actions {
            position: absolute;
            top: -30px;
            right: 0;
            display: none;
            gap: 4px;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            z-index: 10;
        }

        .message:hover .message-actions {
            display: flex;
        }
        
        @media (max-width: 768px) {
            .message-actions {
                display: flex;
                top: -25px;
                padding: 4px 8px;
            }
        }

        .message-action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 20px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            z-index: 20;
        }

        .message-action-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            transform: scale(1.1);
        }

        .message-input-container {
            padding: 16px 20px;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            transition: transform 0.3s ease;
        }

        .emoji-toggle-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 22px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: all 0.2s;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .emoji-toggle-btn:hover {
            background: var(--bg-secondary);
            color: var(--accent-blue);
            transform: scale(1.1);
        }

        .mic-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: all 0.2s;
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .mic-btn.recording {
            background: var(--accent-red);
            color: white;
            animation: pulse 1s infinite;
        }
        .mic-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }

        .message-input {
            width: 100%;
            padding: 12px 18px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            resize: none;
            max-height: 100px;
            min-height: 44px;
            transition: all 0.2s;
        }

        .message-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(43, 154, 255, 0.1);
        }

        .emoji-picker {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 1px solid var(--border-color);
            margin-bottom: 8px;
            flex-wrap: wrap;
            justify-content: center;
            animation: slideDown 0.2s ease;
            max-height: 200px;
            overflow-y: auto;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .emoji-btn {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            padding: 6px;
            transition: all 0.2s;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .emoji-btn:hover {
            transform: scale(1.3);
            background: var(--bg-tertiary);
        }

        .send-btn {
            background: var(--gradient-1);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            font-size: 18px;
            -webkit-tap-highlight-color: transparent;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(43, 154, 255, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 28px;
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content h2 {
            margin-bottom: 20px;
            text-align: center;
            font-size: 22px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .modal-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(43, 154, 255, 0.1);
        }

        .modal-btn {
            background: var(--gradient-1);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 8px;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(43, 154, 255, 0.3);
        }

        .modal-btn.secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 28px;
            cursor: pointer;
            float: right;
            padding: 0 8px;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        .password-input-container {
            position: relative;
            margin-bottom: 16px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .toggle-password:hover {
            color: var(--text-primary);
        }

        .remember-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .auth-tabs {

                    setTimeout(() => {
                        initAbly();
                        checkUrlForChat();
                        startHeartbeat();
                    }, 100);
                }
            }
        }

        function startHeartbeat() {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            heartbeatInterval = setInterval(() => {
                if (ably && ably.connection.state === 'connected' && currentUser) {
                    const presenceChannel = ably.channels.get('presence');
                    presenceChannel.presence.update({ 
                        name: currentUser.name,
                        avatar: currentUser.avatar || '👤',
                        bio: currentUser.bio || '',
                        isAdmin: currentUser.isAdmin || false,
                        dnd: currentUser.dnd || false,
                        lastSeen: Date.now()
                    });
                }
            }, 30000);
        }

        function saveMessagesDebounced() {
            if (saveMessagesTimeout) clearTimeout(saveMessagesTimeout);
            saveMessagesTimeout = setTimeout(() => {
                localStorage.setItem('messages', JSON.stringify(messages));
                localStorage.setItem('messageStatuses', JSON.stringify(messageStatuses));
                localStorage.setItem('deliveredMessages', JSON.stringify(deliveredMessages));
            }, 500);
        }

        function updateProfileUI() {
            if (!currentUser) return;
            const nameSpan = document.getElementById('profileName');
            if (currentUser.isAdmin) {
                nameSpan.innerHTML = '';
                const nameText = document.createTextNode(currentUser.name + ' ');
                nameSpan.appendChild(nameText);
                const badge = document.createElement('span');
                badge.className = 'admin-badge';
                badge.textContent = 'ADMIN';
                nameSpan.appendChild(badge);
            } else {
                nameSpan.textContent = currentUser.name;
            }
            const statusDisplay = document.getElementById('profileStatusDisplay');
            if (currentUser.dnd) {
                statusDisplay.innerHTML = 'не беспокоить <span class="dnd-badge">DND</span>';
            } else {
                statusDisplay.innerHTML = 'онлайн <span class="online-indicator"></span>';
            }
            document.getElementById('profileAvatar').textContent = currentUser.avatar || '👤';
            document.getElementById('profileAvatarLarge').textContent = currentUser.avatar || '👤';
            document.getElementById('profileBioInput').value = currentUser.bio || '';
            document.getElementById('profileDNDCheckbox').checked = currentUser.dnd || false;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function populateEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            picker.innerHTML = '';
            emojiList.forEach(emoji => {
                const btn = document.createElement('button');
                btn.className = 'emoji-btn';
                btn.textContent = emoji;
                btn.onclick = () => addEmoji(emoji);
                picker.appendChild(btn);
            });

        // ========== Ably и чаты ==========
        function initAbly() {
            if (!currentUser) return;
            
            if (ably) {
                try {
                    ably.close();
                } catch (e) {}
            }
            
            ably = new Ably.Realtime({
                key: ABLY_API_KEY,
                clientId: currentUser.id,
                transports: ['web_socket'],
                disconnectedRetryTimeout: 1000,
                suspendedRetryTimeout: 2000,
                realtimeRequestTimeout: 5000,
                echoMessages: false
            });

            ably.connection.on('connected', () => {
                console.log('✅ Connected to Ably');
                
                const presenceChannel = ably.channels.get('presence');
                presenceChannel.presence.enter({ 
                    name: currentUser.name, 
                    avatar: currentUser.avatar || '👤',
                    bio: currentUser.bio || '',
                    isAdmin: currentUser.isAdmin,
                    dnd: currentUser.dnd || false
                });
                
                presenceChannel.presence.subscribe('enter', (member) => {
                    if (member.clientId !== currentUser.id) {
                        onlineUsers[member.clientId] = {
                            id: member.clientId,
                            name: member.data.name,
                            avatar: member.data.avatar || '👤',
                            bio: member.data.bio || '',
                            online: true,
                            isAdmin: member.data.isAdmin || false,
                            dnd: member.data.dnd || false
                        };
                        if (currentTab === 'users') updateChatsList();
                    }
                });
                
                presenceChannel.presence.subscribe('update', (member) => {
                    if (member.clientId !== currentUser.id && onlineUsers[member.clientId]) {
                        onlineUsers[member.clientId] = {
                            ...onlineUsers[member.clientId],
                            name: member.data.name,
                            avatar: member.data.avatar,
                            bio: member.data.bio,
                            isAdmin: member.data.isAdmin,
                            dnd: member.data.dnd
                        };
                        if (currentTab === 'users') updateChatsList();
                    }
                });
                
                presenceChannel.presence.subscribe('leave', (member) => {
                    if (onlineUsers[member.clientId]) {
                        delete onlineUsers[member.clientId];
                        if (currentTab === 'users') updateChatsList();
                    }
                });
                
                presenceChannel.presence.get((err, members) => {
                    if (members) {
                        members.forEach(member => {
                            if (member.clientId !== currentUser.id) {
                                onlineUsers[member.clientId] = {
                                    id: member.clientId,
                                    name: member.data.name,
                                    avatar: member.data.avatar || '👤',
                                    bio: member.data.bio || '',
                                    online: true,
                                    isAdmin: member.data.isAdmin || false,
                                    dnd: member.data.dnd || false
                                };
                            }
                        });
                    }
                    if (currentTab === 'users') updateChatsList();
                });

                const globalChatsChannel = ably.channels.get('global-chats');
                globalChatsChannel.subscribe('new-chat', (message) => {
                    const newChat = message.data;
                    if (!publicChats.find(c => c.id === newChat.id)) {
                        publicChats.push(newChat);
                        localStorage.setItem('publicChats', JSON.stringify(publicChats));
                        if (currentTab === 'public') updateChatsList();
                    }
                });

                const adminChannel = ably.channels.get('admin-actions');
                adminChannel.subscribe('delete-chat', (message) => {
                    const { chatId } = message.data;
                    publicChats = publicChats.filter(c => c.id !== chatId);
                    localStorage.setItem('publicChats', JSON.stringify(publicChats));
                    myChats = myChats.filter(c => c.id !== chatId);
                    localStorage.setItem(`myChats_${currentUser.id}`, JSON.stringify(myChats));
                    if (messages[chatId]) {
                        delete messages[chatId];
                        saveMessagesDebounced();
                    }
                    if (currentChat && currentChat.id === chatId) {
                        currentChat = null;
                        document.getElementById('messagesContainer').innerHTML = '<div class="chat-deleted-message">⚠️ Чат был удален администратором</div>';
                        document.getElementById('currentChatName').innerHTML = 'Чат удален';
                        document.getElementById('chatStatus').innerHTML = '';
                        updateUrlWithChat(null);
                    }
                    updateChatsList();
                });

                adminChannel.subscribe('delete-message', (message) => {
                    const { chatId, messageId } = message.data;
                    if (!deletedMessages[chatId]) deletedMessages[chatId] = [];
                    if (!deletedMessages[chatId].includes(messageId)) {
                        deletedMessages[chatId].push(messageId);
                        localStorage.setItem('deletedMessages', JSON.stringify(deletedMessages));
                    }
                    if (messages[chatId]) {
                        messages[chatId] = messages[chatId].filter(m => m.id !== messageId);
                        saveMessagesDebounced();
                        if (currentChat && currentChat.id === chatId) renderMessages();
                        updateChatsList();
                    }
                });

                // Подписываемся на все мои чаты
                myChats.forEach(chat => subscribeToChat(chat));
            });

            ably.connection.on('disconnected', () => {
                console.log('⚠️ Disconnected from Ably, reconnecting...');
            });

            ably.connection.on('suspended', () => {
                console.warn('⚠️ Connection suspended, will retry...');
            });

            ably.connection.on('failed', (err) => {
                console.error('❌ Connection failed:', err);
                if (reconnectTimeout) clearTimeout(reconnectTimeout);
                reconnectTimeout = setTimeout(() => {
                    if (currentUser) initAbly();
                }, 5000);
            });

            updateChatsList();
        }

        function subscribeToChat(chat) {
            if (!ably) return;
            const chatChannel = ably.channels.get(`chat-${chat.id}`);
            chatChannel.unsubscribe();
            
            chatChannel.subscribe('message', (message) => {
                const msg = message.data;
                if (deletedMessages[chat.id] && deletedMessages[chat.id].includes(msg.id)) return;
                if (!messages[chat.id]) messages[chat.id] = [];
                
                const exists = messages[chat.id].some(m => m.id === msg.id);
                if (!exists) {
                    messages[chat.id].push({
                        ...msg,
                        type: msg.sender === currentUser.id ? 'out' : 'in'
                    });
                    messages[chat.id].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                    
                    // Обновляем статус для отправленных сообщений
                    if (msg.sender !== currentUser.id) {
                        // Это входящее сообщение, отправляем подтверждение доставки
                        sendDeliveryReceipt(chat.id, msg.id);
                    }
                    
                    updateChatLastMessageTime(chat.id, msg.timestamp);
                    
                    if (currentChat?.id !== chat.id && msg.sender !== currentUser.id) {
                        unreadCounts[chat.id] = (unreadCounts[chat.id] || 0) + 1;
                        localStorage.setItem('unreadCounts', JSON.stringify(unreadCounts));
                    }
                    
                    saveMessagesDebounced();
                    
                    if (currentChat && currentChat.id === chat.id) {
                        renderMessages(true);
                        unreadCounts[chat.id] = 0;
                        localStorage.setItem('unreadCounts', JSON.stringify(unreadCounts));
                        
                        // Если мы в чате, отмечаем сообщения как прочитанные
                        markMessagesAsRead(chat.id);
                    }
                    
                    updateChatsList();
                }
            });
            
            chatChannel.subscribe('delivery_receipt', (data) => {
                const { messageId } = data.data;
                if (!deliveredMessages[currentChat?.id]) deliveredMessages[currentChat?.id] = [];
                if (!deliveredMessages[currentChat?.id].includes(messageId)) {
                    deliveredMessages[currentChat?.id].push(messageId);
                    localStorage.setItem('deliveredMessages', JSON.stringify(deliveredMessages));
                    
                    // Обновляем статус сообщения
                    if (messageStatuses[messageId]) {
                        messageStatuses[messageId].status = 'delivered';
                        messageStatuses[messageId].deliveredAt = Date.now();
                    } else {
                        messageStatuses[messageId] = { status: 'delivered', deliveredAt: Date.now() };
                    }
                    saveMessagesDebounced();
                    
                    if (currentChat && currentChat.id === chat.id) {
                        renderMessages(true);
                    }
                }
            });
            
            chatChannel.subscribe('read_receipt', (data) => {
                const { messageId } = data.data;
                if (messageStatuses[messageId]) {
                    messageStatuses[messageId].status = 'read';
                    messageStatuses[messageId].readAt = Date.now();
                } else {
                    messageStatuses[messageId] = { status: 'read', readAt: Date.now() };
                }
                saveMessagesDebounced();
                
                if (currentChat && currentChat.id === chat.id) {
                    renderMessages(true);
                }
            });
            
            chatChannel.subscribe('delete', (data) => {
                const { messageId } = data.data;
                if (!deletedMessages[chat.id]) deletedMessages[chat.id] = [];
                if (!deletedMessages[chat.id].includes(messageId)) {
                    deletedMessages[chat.id].push(messageId);
                    localStorage.setItem('deletedMessages', JSON.stringify(deletedMessages));
                }
                if (messages[chat.id]) {
                    messages[chat.id] = messages[chat.id].filter(m => m.id !== messageId);
                    saveMessagesDebounced();
                    if (currentChat?.id === chat.id) renderMessages(true);
                    updateChatsList();
                }
            });
            
            chatChannel.subscribe('edit', (data) => {
                const { messageId, newText } = data.data;
                if (messages[chat.id]) {
                    const msgIndex = messages[chat.id].findIndex(m => m.id === messageId);
                    if (msgIndex !== -1) {
                        messages[chat.id][msgIndex].text = newText;
                        messages[chat.id][msgIndex].edited = true;
                        saveMessagesDebounced();
                        if (currentChat?.id === chat.id) renderMessages(true);
                    }
                }
            });
            
            // Загружаем историю
            chatChannel.history({ limit: 200 }, (err, resultPage) => {
                if (resultPage && resultPage.items.length > 0) {
                    if (!messages[chat.id]) messages[chat.id] = [];
                    resultPage.items.forEach(item => {
                        const msg = item.data;
                        if (deletedMessages[chat.id] && deletedMessages[chat.id].includes(msg.id)) return;
                        const exists = messages[chat.id].some(m => m.id === msg.id);
                        if (!exists) {
                            messages[chat.id].push({
                                ...msg,
                                type: msg.sender === currentUser.id ? 'out' : 'in'
                            });
                        }
                    });
                    messages[chat.id].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                    saveMessagesDebounced();
                    if (currentChat?.id === chat.id) {
                        renderMessages(true);
                        unreadCounts[chat.id] = 0;
                        localStorage.setItem('unreadCounts', JSON.stringify(unreadCounts));
                        markMessagesAsRead(chat.id);
                    }
                }
            });
        }

        function sendDeliveryReceipt(chatId, messageId) {
            if (!ably) return;
            const chatChannel = ably.channels.get(`chat-${chatId}`);
            chatChannel.publish('delivery_receipt', { 
                messageId, 
                receiver: currentUser.id,
                timestamp: Date.now() 
            });
        }

        function markMessagesAsRead(chatId) {
            if (!ably || !messages[chatId]) return;
            
            // Отправляем подтверждение прочтения для всех непрочитанных сообщений
            messages[chatId].forEach(msg => {
                if (msg.sender !== currentUser.id && 
                    (!messageStatuses[msg.id] || messageStatuses[msg.id].status !== 'read')) {
                    
                    if (!messageStatuses[msg.id]) {
                        messageStatuses[msg.id] = { status: 'read', readAt: Date.now() };
                    } else {
                        messageStatuses[msg.id].status = 'read';
                        messageStatuses[msg.id].readAt = Date.now();
                    }
                    
                    const chatChannel = ably.channels.get(`chat-${chatId}`);
                    chatChannel.publish('read_receipt', { 
                        messageId: msg.id, 
                        reader: currentUser.id,
                        timestamp: Date.now() 
                    });
                }
            });
            saveMessagesDebounced();
        }

        function updateChatLastMessageTime(chatId, timestamp) {
            const chat = myChats.find(c => c.id === chatId);
            if (chat) {
                chat.lastMessageTime = timestamp || Date.now();
                myChats.sort((a, b) => (b.lastMessageTime || 0) - (a.lastMessageTime || 0));
                localStorage.setItem(`myChats_${currentUser.id}`, JSON.stringify(myChats));
            }
        }

        // ========== Аутентификация ==========
        async function login() {
            const now = Date.now();
            if (now - lastLoginAttemptTime > LOGIN_TIMEFRAME) loginAttempts = 0;
            if (loginAttempts >= MAX_LOGIN_ATTEMPTS) {
                alert('Слишком много попыток входа. Попробуйте позже.');
                return;
            }
            loginAttempts++;
            lastLoginAttemptTime = now;

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const remember = document.getElementById('rememberMe').checked;
            
            if (!username || !password) {
                alert('Введите имя и пароль');
                return;
            }
            
            try {
                // Find user by username
                const { data: users, error: findError } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('username', username)
                    .limit(1);
                
                if (findError) throw findError;
                
                const user = users?.[0];
                
                if (user && user.password === password) {
                    const { data: { session }, error: signInError } = await supabaseClient.auth.signInWithPassword({
                        email: `${username}@telegram.local`,
                        password: password
                    });
                    
                    if (signInError) throw signInError;
                    
                    const isAdmin = username === ADMIN_USERNAME;
                    currentUser = {
                        id: user.id,
                        name: user.username,
                        avatar: user.avatar || '👤',
                        bio: user.bio || '',
                        isAdmin: isAdmin,
                        dnd: user.dnd || false
                    };
                    
                    if (remember) localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    
                    myChats = JSON.parse(localStorage.getItem(`myChats_${currentUser.id}`)) || [];
                    
                    document.getElementById('loginModal').classList.remove('active');
                    document.getElementById('appContainer').style.display = 'flex';
                    
                    updateProfileUI();
                    
                    initAbly();
                    startHeartbeat();
                    checkUrlForChat();
                } else {
                    alert('Неверное имя пользователя или пароль');
                }
            } catch (err) {
                console.error('Login error:', err);
                alert('Ошибка при входе');
            }
        }

        async function register() {
            const now = Date.now();
            if (now - lastLoginAttemptTime > LOGIN_TIMEFRAME) loginAttempts = 0;
            if (loginAttempts >= MAX_LOGIN_ATTEMPTS) {
                alert('Слишком много попыток регистрации. Попробуйте позже.');
                return;
            }
            loginAttempts++;
            lastLoginAttemptTime = now;

            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const remember = document.getElementById('rememberMeRegister').checked;
            
            if (!username || !password) {
                alert('Заполните все поля');
                return;
            }
            if (password !== confirmPassword) {
                alert('Пароли не совпадают');
                return;
            }
            if (password.length < 3) {
                alert('Пароль должен быть минимум 3 символа');
                return;
            }
            
            try {
                // Check if username exists
                const { data: existingUsers } = await supabaseClient
                    .from('users')
                    .select('username')
                    .eq('username', username)
                    .limit(1);
                
                if (existingUsers && existingUsers.length > 0) {
                    alert('Пользователь с таким именем уже существует');
                    return;
                }
                
                // Create auth user
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email: `${username}@telegram.local`,
                    password: password,
                    options: {
                        data: {
                            username: username
                        }
                    }
                });
                
                if (authError) throw authError;
                
                const isAdmin = username === ADMIN_USERNAME;
                const newUser = {
                    id: authData.user.id,
                    username: username,
                    password: password,
                    avatar: '👤',
                    bio: '',
                    dnd: false,
                    created_at: new Date().toISOString()
                };
                
                // Save user to users table
                const { error: insertError } = await supabaseClient
                    .from('users')
                    .insert([newUser]);
                
                if (insertError) throw insertError;
                
                currentUser = {
                    id: newUser.id,
                    name: newUser.username,
                    avatar: newUser.avatar,
                    bio: newUser.bio,
                    isAdmin: isAdmin,
                    dnd: false
                };
                
                if (remember) localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                document.getElementById('loginModal').classList.remove('active');
                document.getElementById('appContainer').style.display = 'flex';
                
                updateProfileUI();
                
                initAbly();
                startHeartbeat();
            } catch (err) {
                console.error('Registration error:', err);
                alert('Ошибка при регистрации');
            }
        }

        async function logout() {
            if (mediaRecorder && isRecording) {
                stopRecording();
            }
            
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            
            // Останавливаем все аудио
            Object.values(audioElements).forEach(audio => {
                if (audio) {
                    audio.pause();
                    audio.currentTime = 0;
                }
            });
            audioElements = {};
            activeAudio = null;
            activeAudioId = null;
            
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
            if (reconnectTimeout) {
                clearTimeout(reconnectTimeout);
                reconnectTimeout = null;
            }
            if (saveMessagesTimeout) {
                clearTimeout(saveMessagesTimeout);
                saveMessagesTimeout = null;
            }
            if (recordingTimeout) {
                clearTimeout(recordingTimeout);
                recordingTimeout = null;
            }
            
            if (ably) {
                try {
                    myChats.forEach(chat => {
                        const channel = ably.channels.get(`chat-${chat.id}`);
                        channel.unsubscribe();
                    });
                    
                    const presenceChannel = ably.channels.get('presence');
                    presenceChannel.presence.leave();
                    
                    ably.close();
                } catch (e) {
                    console.error('Error closing Ably:', e);
                }
                ably = null;
            }
            
            await supabaseClient.auth.signOut();
            
            localStorage.removeItem('currentUser');
            currentUser = null;
            currentChat = null;
            myChats = [];
            onlineUsers = {};
            
            document.getElementById('appContainer').style.display = 'none';
            document.getElementById('loginModal').classList.add('active');
            updateUrlWithChat(null);
            
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('registerUsername').value = '';
            document.getElementById('registerPassword').value = '';
            document.getElementById('registerConfirmPassword').value = '';
        }

        // ========== Отправка сообщений ==========
        function sendMessage() {
            if (sendBtnDisabled) {
                alert('Слишком часто! Подождите секунду.');
                return;
            }

            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!currentChat) {
                alert('Сначала выберите чат');
                return;
            }
            if (!text) return;
            
            disableSendButton();

            if (!myChats.find(c => c.id === currentChat.id)) {
                myChats.push(currentChat);
                localStorage.setItem(`myChats_${currentUser.id}`, JSON.stringify(myChats));
                if (ably) subscribeToChat(currentChat);
            }
            
            const now = new Date();
            const timeString = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            const messageId = Date.now().toString() + Math.random().toString(36).substr(2, 5);
            const timestamp = Date.now();
            
            // Сохраняем статус сообщения
            messageStatuses[messageId] = { status: 'sent', sentAt: timestamp };
            
            const message = {
                id: messageId,
                chatId: currentChat.id,
                sender: currentUser.id,
                senderName: currentUser.name,
                text: text,
                time: timeString,
                isAdmin: currentUser.isAdmin || false,
                timestamp: timestamp,
                status: 'sent' // начальный статус
            };
            
            if (!messages[currentChat.id]) messages[currentChat.id] = [];
            messages[currentChat.id].push({ ...message, type: 'out' });
            messages[currentChat.id].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
            
            saveMessagesDebounced();
            
            updateChatLastMessageTime(currentChat.id, timestamp);
            
            if (ably) {
                const chatChannel = ably.channels.get(`chat-${currentChat.id}`);
                chatChannel.publish('message', message);
            }
            
            input.value = '';
            input.style.height = 'auto';
            renderMessages(true);
            updateChatsList();
        }

        async function sendAudioMessage(audioBlob, duration) {
            if (!currentChat) {
                alert('Сначала выберите чат');
                return;
            }

            if (!myChats.find(c => c.id === currentChat.id)) {
                myChats.push(currentChat);
                localStorage.setItem(`myChats_${currentUser.id}`, JSON.stringify(myChats));
                if (ably) subscribeToChat(currentChat);
            }

            const now = new Date();
            const timeString = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            const messageId = Date.now().toString() + Math.random().toString(36).substr(2, 5);
            const timestamp = Date.now();

            // Статус pending для голосовых
            messageStatuses[messageId] = { status: 'pending', sentAt: timestamp };

            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = () => {
                const base64Audio = reader.result;

                const message = {
                    id: messageId,
                    chatId: currentChat.id,
                    sender: currentUser.id,
                    senderName: currentUser.name,
                    audio: base64Audio,
                    duration: duration,
                    time: timeString,
                    isAdmin: currentUser.isAdmin || false,
                    timestamp: timestamp,
                    status: 'pending'
                };

                if (!messages[currentChat.id]) messages[currentChat.id] = [];
                messages[currentChat.id].push({ ...message, type: 'out' });
                messages[currentChat.id].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

                saveMessagesDebounced();

                updateChatLastMessageTime(currentChat.id, timestamp);

                if (ably) {
                    const chatChannel = ably.channels.get(`chat-${currentChat.id}`);
                    chatChannel.publish('message', message);
                    
                    // Через небольшую задержку меняем статус на sent (имитация успешной отправки)
                    setTimeout(() => {
                        if (messageStatuses[messageId]) {
                            messageStatuses[messageId].status = 'sent';
                            saveMessagesDebounced();
                            renderMessages(true);
                        }
                    }, 500);
                }

                renderMessages(true);
                updateChatsList();
            };
        }

        function disableSendButton() {
            sendBtnDisabled = true;
            document.getElementById('sendBtn').style.opacity = '0.5';
            document.getElementById('sendBtn').style.pointerEvents = 'none';
            setTimeout(() => {
                sendBtnDisabled = false;
                document.getElementById('sendBtn').style.opacity = '1';
                document.getElementById('sendBtn').style.pointerEvents = 'auto';
            }, MESSAGE_COOLDOWN);
        }

        // ========== Голосовые сообщения и аудиоплеер ==========
        async function startRecording() {
            if (isRecording) return;
            if (!currentChat) {
                alert('Сначала выберите чат');
                return;
            }
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert('Ваш браузер не поддерживает запись аудио');
                return;
            }
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(mediaStream);
                audioChunks = [];

                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const duration = Math.round(audioBlob.size / 16000);
                    
                    if (mediaStream) {
                        mediaStream.getTracks().forEach(track => track.stop());
                        mediaStream = null;
                    }
                    
                    if (audioBlob.size > 0) {
                        sendAudioMessage(audioBlob, duration);
                    }
                };

                mediaRecorder.start();
                isRecording = true;
                document.getElementById('micBtn').classList.add('recording');
                
                recordingTimeout = setTimeout(() => {
                    if (isRecording) stopRecording();
                }, 60000);
            } catch (err) {
                alert('Не удалось получить доступ к микрофону');
                console.error(err);
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('micBtn').classList.remove('recording');
                if (recordingTimeout) {
                    clearTimeout(recordingTimeout);
                    recordingTimeout = null;
                }
            }
        }

        function toggleAudio(messageId, audioSrc) {
            if (activeAudioId === messageId && activeAudio) {
                // То же сообщение - переключаем паузу/воспроизведение
                if (!activeAudio.paused) {
                    activeAudio.pause();
                } else {
                    activeAudio.play().catch(e => console.error('Play failed:', e));
                }
                return;
            }
            
            // Другое сообщение - останавливаем предыдущее и запускаем новое
            if (activeAudio) {
                activeAudio.pause();
                activeAudio.currentTime = 0;
                updateAudioButton(activeAudioId, false);
            }
            
            // Создаем новый аудио элемент, если его нет
            if (!audioElements[messageId]) {
                audioElements[messageId] = new Audio(audioSrc);
                audioElements[messageId].addEventListener('timeupdate', () => updateAudioProgress(messageId));
                audioElements[messageId].addEventListener('ended', () => {
                    updateAudioButton(messageId, false);
                    updateAudioProgress(messageId);
                });
                audioElements[messageId].addEventListener('pause', () => updateAudioButton(messageId, false));
                audioElements[messageId].addEventListener('play', () => updateAudioButton(messageId, true));
            }
            
            activeAudio = audioElements[messageId];
            activeAudioId = messageId;
            
            activeAudio.play().catch(e => console.error('Play failed:', e));
        }

        function updateAudioButton(messageId, isPlaying) {
            const btn = document.querySelector(`.play-pause-btn[data-message-id="${messageId}"]`);
            if (btn) {
                btn.textContent = isPlaying ? '⏸️' : '▶️';
            }
        }

        function updateAudioProgress(messageId) {
            const audio = audioElements[messageId];
            if (!audio) return;
            
            const progressFill = document.querySelector(`.audio-progress-fill[data-message-id="${messageId}"]`);
            const timeDisplay = document.querySelector(`.audio-time[data-message-id="${messageId}"]`);
            
            if (progressFill) {
                const percent = (audio.currentTime / audio.duration) * 100 || 0;
                progressFill.style.width = percent + '%';
            }
            
            if (timeDisplay) {
                const current = formatTime(audio.currentTime);
                const total = formatTime(audio.duration);
                timeDisplay.textContent = `${current}/${total}`;
            }
        }

        function seekAudio(messageId, event) {
            const audio = audioElements[messageId];
            if (!audio) return;
            
            const progressBar = event.currentTarget;
            const rect = progressBar.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const percent = clickX / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function getStatusIcon(status) {
            switch(status) {
                case 'pending': return '⏳';
                case 'sent': return '✓';
                case 'delivered': return '✓✓';
                case 'read': return '✓✓';
                default: return '';
            }
        }

        function getStatusClass(status) {
            switch(status) {
                case 'pending': return 'status-pending';
                case 'sent': return 'status-sent';
                case 'delivered': return 'status-delivered';
                case 'read': return 'status-read';
                default: return '';
            }
        }

        // ========== Рендер сообщений ==========
        function renderMessages(animate = true) {
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            
            const oldScrollHeight = container.scrollHeight;
            const oldScrollTop = container.scrollTop;
            const isAtBottom = oldScrollHeight - oldScrollTop - container.clientHeight < 50;
            
            container.innerHTML = '';
            
            if (!currentChat) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 40px;">👈 Выберите чат</div>';
                return;
            }
            
            if (!messages[currentChat.id] || messages[currentChat.id].length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 40px;">Нет сообщений. Напишите что-нибудь!</div>';
                return;
            }
            
            messages[currentChat.id].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
            
            const fragment = document.createDocumentFragment();
            
            messages[currentChat.id].forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.type}`;
                if (!animate) messageDiv.style.animation = 'none';
                messageDiv.setAttribute('data-id', msg.id);
                
                let content = '';
                let statusHtml = '';
                
                // Получаем статус сообщения
                const status = messageStatuses[msg.id] || { status: msg.sender === currentUser.id ? 'sent' : 'delivered' };
                
                if (msg.type === 'out') {
                    statusHtml = `<span class="message-status ${getStatusClass(status.status)}"><span class="status-icon">${getStatusIcon(status.status)}</span></span>`;
                }
                
                if (msg.text) {
                    content = `<div class="message-bubble">${escapeHtml(msg.text)}${msg.edited ? ' <span style="font-size: 10px; opacity: 0.7;">(ред.)</span>' : ''}</div>`;
                } else if (msg.audio) {
                    const messageId = msg.id;
                    const duration = msg.duration || 0;
                    
                    content = `
                        <div class="message-bubble audio-message">
                            <div class="audio-player">
                                <button class="play-pause-btn" data-message-id="${messageId}" onclick="toggleAudio('${messageId}', '${msg.audio}')">▶️</button>
                                <div class="audio-progress" onclick="seekAudio('${messageId}', event)">
                                    <div class="audio-progress-fill" data-message-id="${messageId}" style="width: 0%"></div>
                                </div>
                                <span class="audio-time" data-message-id="${messageId}">0:00/${formatTime(duration)}</span>
                            </div>
                        </div>
                    `;
                } else if (msg.media) {
                    if (msg.media.type.startsWith('image/')) {
                        content = `<img src="${msg.media.url}" class="message-media" onclick="openMedia('${msg.media.url}')">`;
                    } else if (msg.media.type.startsWith('video/')) {
                        content = `<video src="${msg.media.url}" class="message-media" controls onclick="event.stopPropagation()"></video>`;
                    }
                }
                
                let actions = '';
                if (msg.sender === currentUser.id || (currentUser && currentUser.isAdmin)) {
                    actions = `
                        <div class="message-actions">
                            ${msg.sender === currentUser.id ? `<button class="message-action-btn" onclick="editMessage('${msg.id}', event)">✏️</button>` : ''}
                            <button class="message-action-btn" onclick="deleteMessage('${msg.id}', event)">🗑️</button>
                        </div>
                    `;
                }
                
                const showAdminBadge = msg.isAdmin && msg.senderName === ADMIN_USERNAME;
                
                messageDiv.innerHTML = `
                    ${actions}
                    ${msg.type === 'in' ? `<div class="message-sender">${escapeHtml(msg.senderName)}${showAdminBadge ? ' <span class="admin-badge">ADMIN</span>' : ''}</div>` : ''}
                    ${content}
                    <div class="message-footer">
                        <span class="message-time">${msg.time}</span>
                        ${statusHtml}
                    </div>
                `;
                
                fragment.appendChild(messageDiv);
            });
            
            container.appendChild(fragment);
            
            if (isAtBottom) {
                container.scrollTo({
                    top: container.scrollHeight,
                    behavior: animate ? 'smooth' : 'auto'
                });
            }
            
            // Если мы в чате, отмечаем сообщения как прочитанные
            if (currentChat) {
                markMessagesAsRead(currentChat.id);
            }
        }

        // ========== Управление чатами и списком ==========
