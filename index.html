        // ========== ОБНОВЛЕНИЕ UI ==========
        function updateChatsList() {
            const list = document.getElementById('chatsList');
            if (!list) return;
            
            let items = [];
            
            if (currentTab === 'chats') {
                items = [...myChats].sort((a, b) => {
                    const aIsSaved = a.type === 'private' && a.pair_key === `${currentUser.id}_${currentUser.id}`;
                    const bIsSaved = b.type === 'private' && b.pair_key === `${currentUser.id}_${currentUser.id}`;
                    if (aIsSaved && !bIsSaved) return -1;
                    if (!aIsSaved && bIsSaved) return 1;
                    
                    const aPinned = isChatPinned(a.id);
                    const bPinned = isChatPinned(b.id);
                    
                    if (aPinned && !bPinned) return -1;
                    if (!aPinned && bPinned) return 1;
                    
                    return new Date(b.created_at) - new Date(a.created_at);
                });
            } else if (currentTab === 'public') {
                items = [...publicChats].sort((a, b) => {
                    return new Date(b.created_at) - new Date(a.created_at);
                });
            } else if (currentTab === 'users') {
                const allUsersList = allUsers.map(user => {
                    const onlineUser = onlineUsers[user.id];
                    const isCurrentUser = user.id === currentUser.id;
                    
                    if (isCurrentUser) return null;
                    
                    return {
                        id: user.id,
                        name: user.username,
                        avatar: user.avatar || '👤',
                        bio: user.bio || '',
                        online: onlineUser ? onlineUser.online : false,
                        isAdmin: user.username === ADMIN_USERNAME,
                        dnd: onlineUser ? onlineUser.dnd : (user.dnd || false),
                        lastSeen: onlineUser ? onlineUser.lastSeen : (user.last_seen ? new Date(user.last_seen).getTime() : null)
                    };
                }).filter(Boolean);
                
                items = allUsersList;
            }
            
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                items = items.filter(item => 
                    (item.name || '').toLowerCase().includes(searchTerm) ||
                    (item.bio || '').toLowerCase().includes(searchTerm)
                );
            }
            
            let newHTML = '';
            
            if (items.length === 0) {
                newHTML = '<div class="empty-state">Ничего не найдено</div>';
            } else {
                const fragment = [];
                
                items.forEach(item => {
                    if (currentTab === 'users') {
                        fragment.push(renderUserItem(item));
                    } else {
                        fragment.push(renderChatItem(item));
                    }
                });
                
                newHTML = fragment.join('');
            }
            
            list.innerHTML = newHTML;
        }

        function renderUserItem(user) {
            const statusClass = user.online ? (user.dnd ? 'dnd' : 'online') : 'offline';
            const lastSeenText = !user.online && user.lastSeen ? formatLastSeen(user.lastSeen) : '';
            
            return `
                <div class="chat-item" onclick="createPrivateChat({id: '${user.id}', name: '${user.name}', avatar: '${user.avatar}'})">
                    <div class="chat-avatar">${user.avatar}</div>
                    <div class="chat-details">
                        <div class="chat-name">
                            ${user.name}
                            ${user.isAdmin ? '<span class="creator-badge">Создатель</span>' : ''}
                            <div class="status-container">
                                <span class="status-dot ${statusClass}"></span>
                                ${!user.online && lastSeenText ? `<span class="last-seen">${lastSeenText}</span>` : ''}
                                ${user.dnd && user.online ? '<span class="dnd-badge">Не беспокоить</span>' : ''}
                            </div>
                        </div>
                        <div class="chat-last-message">${user.bio || 'Нет информации'}</div>
                    </div>
                </div>
            `;
        }

        function renderChatItem(chat) {
            const lastMsg = messages[chat.id] && messages[chat.id].length > 0 ? messages[chat.id][messages[chat.id].length - 1] : null;
            const unread = unreadCounts[chat.id] || 0;
            const isPinned = isChatPinned(chat.id);
            
            let lastMessageText = 'Нет сообщений';
            if (lastMsg) {
                lastMessageText = lastMsg.text ? lastMsg.text : (lastMsg.audio ? '🎤 Голосовое' : '📷 Медиа');
            }
            
            const timeText = lastMsg ? lastMsg.time : '';
            
            let displayName = chat.name;
            let avatar = chat.avatar || '👥';
            
            if (chat.type === 'private' && currentUser) {
                if (chat.pair_key === `${currentUser.id}_${currentUser.id}`) {
                    displayName = 'Избранное';
                    avatar = '⭐';
                } else {
                    const otherId = chat.pair_key.split('_').find(id => id !== currentUser.id);
                    const otherUser = allUsers.find(u => u.id === otherId);
                    if (otherUser) {
                        displayName = otherUser.username;
                        avatar = otherUser.avatar || '👤';
                    } else {
                        displayName = 'Пользователь';
                    }
                }
            }
            
            return `
                <div class="chat-item ${currentChat?.id === chat.id ? 'active' : ''}" onclick="joinChat(${JSON.stringify(chat).replace(/"/g, '&quot;')})">
                    <div class="chat-avatar">${avatar}</div>
                    <div class="chat-details">
                        <div class="chat-name">
                            ${displayName}
                            ${isPinned ? '<span class="pin-icon">📌</span>' : ''}
                            ${chat.is_public ? '<span class="lock-icon">🌐</span>' : '<span class="lock-icon">🔒</span>'}
                            ${currentUser?.isAdmin && currentUser.name === ADMIN_USERNAME && currentTab === 'public' ? 
                                `<button class="delete-chat-btn" onclick="deleteChat('${chat.id}', event)">Удалить</button>` : ''}
                            <button class="pin-chat-btn ${isPinned ? 'pinned' : ''}" onclick="togglePinChat('${chat.id}', event)">📌</button>

        // ========== АУДИО ==========
        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            const messageInput = document.getElementById('messageInput');
            
            if (messageInput.value.trim().length > 0) {
                return;
            }
            
            if (!currentChat) {
                alert('Сначала выберите чат');
                return;
            }
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert('Ваш браузер не поддерживает запись аудио');
                return;
            }
            
            recordingStartTime = Date.now();
            
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    mediaStream = stream;
                    
                    let mimeType = 'audio/webm';
                    if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
                        mimeType = 'audio/webm;codecs=opus';
                    } else if (MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')) {
                        mimeType = 'audio/ogg;codecs=opus';
                    }
                    
                    const options = { mimeType: mimeType };
                    
                    try {
                        mediaRecorder = new MediaRecorder(stream, options);
                    } catch (e) {
                        mediaRecorder = new MediaRecorder(stream);
                    }
                    
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const duration = Math.round((Date.now() - recordingStartTime) / 1000);
                        
                        if (mediaStream) {
                            mediaStream.getTracks().forEach(track => track.stop());
                            mediaStream = null;
                        }
                        
                        if (audioBlob.size > 0 && duration > 0.1) {
                            await sendAudioMessage(audioBlob, duration);
                        }
                        
                        document.getElementById('micBtn').classList.remove('recording');
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    document.getElementById('micBtn').classList.add('recording');
                    
                    recordingTimeout = setTimeout(() => {
                        if (isRecording) stopRecording();
                    }, 60000);
                })
                .catch(err => {
                    console.error('Microphone access error:', err);
                    alert('Не удалось получить доступ к микрофону');
                });
        }

        function stopRecording() {
            if (!isRecording) return;
            
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                
                if (recordingTimeout) {
                    clearTimeout(recordingTimeout);
                    recordingTimeout = null;
                }
            }
        }

        function toggleAudio(messageId, audioSrc) {
            if (!audioElements[messageId]) {
                try {
                    audioElements[messageId] = new Audio(audioSrc);
                    
                    audioElements[messageId].ontimeupdate = () => updateAudioProgress(messageId);
                    
                    audioElements[messageId].onended = () => {
                        updateAudioButton(messageId, false);
                        updateAudioProgress(messageId);
                    };
                    
                    audioElements[messageId].onpause = () => {
                        updateAudioButton(messageId, false);
                    };
                    
                    audioElements[messageId].onplay = () => {
                        updateAudioButton(messageId, true);
                    };
                    
                    audioElements[messageId].onerror = (e) => {
                        console.error('Audio playback error:', e);
                        alert('Ошибка воспроизведения аудио.');
                    };
                } catch (e) {
                    console.error('Error creating audio element:', e);
                    alert('Не удалось создать аудио элемент');
                    return;
                }
            }
            
            const audio = audioElements[messageId];
            
            if (activeAudioId === messageId && activeAudio) {
                if (!activeAudio.paused) {
                    activeAudio.pause();
                    updateAudioButton(messageId, false);
                } else {
                    activeAudio.play().catch(e => {
                        console.error('Play failed:', e);
                        alert('Не удалось воспроизвести аудио');
                    });
                    updateAudioButton(messageId, true);
                }
                return;
            }
            
            if (activeAudio) {
                activeAudio.pause();
                activeAudio.currentTime = 0;
                updateAudioButton(activeAudioId, false);
            }
            
            activeAudio = audio;
            activeAudioId = messageId;
            
            activeAudio.play().catch(e => {
                console.error('Audio play error:', e);
                alert('Не удалось воспроизвести аудио');
            });
            updateAudioButton(messageId, true);
        }

        function updateAudioButton(messageId, isPlaying) {
            const btn = document.querySelector(`.play-pause-btn[data-message-id="${messageId}"]`);
            if (btn) {
                btn.innerHTML = isPlaying ? '⏸️' : '▶️';
                if (isPlaying) {
                    btn.classList.add('playing');
                } else {
                    btn.classList.remove('playing');
                }
            }
        }

        function updateAudioProgress(messageId) {
            const audio = audioElements[messageId];
            if (!audio) return;
            
            const progressFill = document.querySelector(`.audio-progress-fill[data-message-id="${messageId}"]`);
            const currentTimeSpan = document.querySelector(`.audio-current-time[data-message-id="${messageId}"]`);
            const durationSpan = document.querySelector(`.audio-duration[data-message-id="${messageId}"]`);
            
            if (progressFill) {
                const percent = (audio.currentTime / audio.duration) * 100 || 0;
                progressFill.style.width = percent + '%';
            }
            
            if (currentTimeSpan) {
                currentTimeSpan.textContent = formatTime(audio.currentTime);
            }
            
            if (durationSpan && audio.duration && !isNaN(audio.duration)) {
                durationSpan.textContent = formatTime(audio.duration);
            }
        }

        function seekAudio(messageId, event) {
            const audio = audioElements[messageId];
            if (!audio) return;
            
            const progressBar = event.currentTarget;
            const rect = progressBar.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const percent = Math.max(0, Math.min(1, clickX / rect.width));
            audio.currentTime = percent * audio.duration;
            updateAudioProgress(messageId);
        }

        function getIceServers() {
            return {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun3.l.google.com:19302' },

        async function startCall() {
            if (!callsTableExists) {
                await checkCallsTable();
                if (!callsTableExists) {
                    alert('Функция звонков недоступна.');
                    return;
                }
            }
            if (!currentChat || currentChat.is_public) return;
            
            if (currentChat.pair_key === `${currentUser.id}_${currentUser.id}`) {
                alert('Нельзя звонить самому себе');
                return;
            }
            
            const otherId = currentChat.pair_key.split('_').find(id => id !== currentUser.id);
            const otherUser = allUsers.find(u => u.id === otherId);
            if (!otherUser) {
                alert('Не удалось определить собеседника');
                return;
            }
            const receiverId = otherUser.id;
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                
                peerConnection = new RTCPeerConnection(getIceServers());
                
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                const callId = generateUUID();
                const timestamp = Date.now();
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate && ably) {
                        const userChannel = ably.channels.get(`user-${receiverId}`);
                        userChannel.publish('ice-candidate', {
                            callId,
                            candidate: event.candidate,
                            senderId: currentUser.id,
                            timestamp: Date.now()
                        });
                    }
                };
                
                peerConnection.ontrack = (event) => {
                    console.log('Received remote track');
                    const remoteStream = event.streams[0];
                    const audioElement = document.createElement('audio');
                    audioElement.srcObject = remoteStream;
                    audioElement.autoplay = true;
                    audioElement.controls = false;
                    audioElement.style.display = 'none';
                    document.body.appendChild(audioElement);
                    
                    const playAudio = () => {
                        audioElement.play().catch(e => console.warn('Play failed:', e));
                        document.removeEventListener('click', playAudio);
                    };
                    document.addEventListener('click', playAudio, { once: true });
                    
                    document.getElementById('callStatus').textContent = 'В разговоре';
                    if (!callTimerInterval) {
                        startCallTimer();
                    }
                };
                
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                const callRecord = {
                    caller_id: currentUser.id,
                    receiver_id: receiverId,
                    status: 'calling',
                    created_at: new Date().toISOString()
                };
                
                const { data, error } = await supabaseClient
                    .from('calls')
                    .insert([callRecord])
                    .select();
                
                if (error) throw error;
                
                const dbCallId = data[0].id;
                
                currentCall = {
                    id: callId,
                    dbId: dbCallId,
                    receiverId,
                    callerId: currentUser.id,
                    callerName: currentUser.name,
                    callerAvatar: currentUser.avatar,
                    timestamp
                };
                
                if (ably) {
                    const userChannel = ably.channels.get(`user-${receiverId}`);
                    userChannel.publish('offer', {
                        callId,
                        dbCallId,
                        offer,
                        callerId: currentUser.id,
                        callerName: currentUser.name,
                        callerAvatar: currentUser.avatar,
                        timestamp
                    });
                }
                
                showOutgoingCallModal();
                
            } catch (err) {
                console.error('Error starting call:', err);
                alert('Не удалось начать звонок: ' + (err.message || 'проверьте консоль'));
            }
        }

        function startCallTimer() {
            if (callTimerInterval) clearInterval(callTimerInterval);
            callStartTime = Date.now();
            callTimerInterval = setInterval(() => {
                const elapsed = Date.now() - callStartTime;
                if (elapsed >= CALL_DURATION_LIMIT) {
                    alert('Длительность звонка превысила 30 минут. Звонок завершён.');
                    endCall();
                    return;
                }
                document.getElementById('callTimer').textContent = formatCallTime(elapsed);
            }, 1000);
        }

        async function answerCall() {
            if (!currentCall || !peerConnection) return;
            
            if (Date.now() - currentCall.timestamp > 10000) {
                alert('Звонок устарел');
                endCall();
                return;
            }
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                await peerConnection.setRemoteDescription(new RTCSessionDescription(currentCall.offer));
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                if (currentCall.dbId) {
                    await supabaseClient
                        .from('calls')
                        .update({ status: 'active' })
                        .eq('id', currentCall.dbId);
                }
                
                if (ably) {
                    const userChannel = ably.channels.get(`user-${currentCall.callerId}`);
                    userChannel.publish('answer', {
                        callId: currentCall.id,
                        answer,
                        timestamp: Date.now()
                    });
                }
                
                document.getElementById('incomingCallControls').style.display = 'none';
                document.getElementById('outgoingCallControls').style.display = 'flex';
                document.getElementById('muteCallBtn').onclick = toggleMute;
                document.getElementById('muteCallBtn').classList.remove('muted');
                document.getElementById('callStatus').textContent = 'В разговоре';
                startCallTimer();
                
                if (callRingtone) {
                    callRingtone.pause();
                    callRingtone.currentTime = 0;
                }
                
                if (callAcceptedSound) {
                    callAcceptedSound.play().catch(() => {});
                }
                
            } catch (err) {
                console.error('Error answering call:', err);
                alert('Не удалось ответить на звонок');
            }
        }

        async function rejectCall() {
            if (currentCall && ably) {
                const userChannel = ably.channels.get(`user-${currentCall.callerId}`);
                userChannel.publish('end', {
                    callId: currentCall.id,
                    timestamp: Date.now()
                });
                
                if (currentCall.dbId) {
                    await supabaseClient
                        .from('calls')
                        .update({ status: 'ended' })
                        .eq('id', currentCall.dbId);
                }
            }
            
            endCall();
        }

        function endCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            
            if (callTimerInterval) {
                clearInterval(callTimerInterval);
                callTimerInterval = null;
            }
            callStartTime = null;
            
            if (callModal) {
                callModal.classList.remove('active');
            }
            
            if (callRingtone) {
                callRingtone.pause();
                callRingtone.currentTime = 0;
            }
            
            if (callEndedSound) {
                callEndedSound.play().catch(() => {});
            }
            
            currentCall = null;
        }

        function toggleMute() {
            if (!localStream) return;
            
            const audioTracks = localStream.getAudioTracks();
            if (audioTracks.length === 0) return;
            
            const enabled = !audioTracks[0].enabled;
            audioTracks.forEach(track => {
                track.enabled = enabled;
            });
            
            callMuted = !enabled;
            
            const muteBtn = document.getElementById('muteCallBtn');
            const incomingMuteBtn = document.getElementById('incomingMuteBtn');
            
            [muteBtn, incomingMuteBtn].forEach(btn => {
                if (btn) {
                    if (callMuted) {
                        btn.textContent = '🔴';
                        btn.classList.add('muted');
                    } else {
                        btn.textContent = '🎤';
                        btn.classList.remove('muted');
                    }
                }
            });
        }

        function listenForIncomingCalls() {
            if (!ably || !currentUser) return;
            
            const userChannel = ably.channels.get(`user-${currentUser.id}`);
            
            userChannel.subscribe('offer', async (message) => {
                const { offer, callerId, callerName, callerAvatar, callId, dbCallId, timestamp } = message.data;
                
                if (Date.now() - timestamp > 10000) {
                    console.log('Ignoring old call offer', timestamp);
                    return;
                }
                
                if (currentCall) {
                    userChannel.publish('end', { callId, timestamp: Date.now() });
                    return;
                }
                
                peerConnection = new RTCPeerConnection(getIceServers());
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate && ably) {
                        userChannel.publish('ice-candidate', {
                            callId,
                            candidate: event.candidate,
                            senderId: currentUser.id,
                            timestamp: Date.now()
                        });
                    }
                };
                
                peerConnection.ontrack = (event) => {
                    console.log('Received remote track (incoming)');
                    const remoteStream = event.streams[0];
                    const audioElement = document.createElement('audio');
                    audioElement.srcObject = remoteStream;
                    audioElement.autoplay = true;
                    audioElement.controls = false;
                    audioElement.style.display = 'none';
                    document.body.appendChild(audioElement);
                    
                    const playAudio = () => {
                        audioElement.play().catch(e => console.warn('Play failed:', e));
                        document.removeEventListener('click', playAudio);
                    };
                    document.addEventListener('click', playAudio, { once: true });
                    
                    document.getElementById('callStatus').textContent = 'В разговоре';
                    if (!callTimerInterval) {
                        startCallTimer();
                    }
                };
                
                currentCall = {
                    id: callId,
                    dbId: dbCallId,
                    callerId,
                    callerName,
                    callerAvatar,
                    offer,
                    timestamp
                };
                
                showIncomingCallModal(callerName, callerAvatar, timestamp);
                
                if (!currentUser.dnd && callRingtone) {
                    callRingtone.loop = true;
                    callRingtone.play().catch(() => {});
                }
            });

            userChannel.subscribe('answer', async (message) => {
                const { answer, callId, timestamp } = message.data;
                if (!currentCall || currentCall.id !== callId) return;
                
                if (Date.now() - timestamp > 10000) {
                    console.log('Ignoring old answer');
                    return;
                }
                
                try {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                    document.getElementById('callStatus').textContent = 'В разговоре';
                    startCallTimer();
                    
                    if (callAcceptedSound) {
                        callAcceptedSound.play().catch(() => {});
                    }
                } catch (err) {
                    console.error('Error setting remote description:', err);
                }
            });

            userChannel.subscribe('ice-candidate', (message) => {
                const { candidate, callId, timestamp } = message.data;
                if (!currentCall || currentCall.id !== callId) return;
                
                if (Date.now() - timestamp > 10000) return;
                
                peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(err => {
                    console.error('Error adding ICE candidate:', err);
                });
            });

            userChannel.subscribe('end', (message) => {
                const { callId, timestamp } = message.data;
                if (!currentCall || currentCall.id !== callId) return;
                
                endCall();
            });
        }

            document.getElementById('tabChats').className = tab === 'chats' ? 'tab active' : 'tab';
            document.getElementById('tabPublic').className = tab === 'public' ? 'tab active' : 'tab';
            document.getElementById('tabUsers').className = tab === 'users' ? 'tab active' : 'tab';
            document.getElementById('searchInput').value = '';
            
            if (tab === 'users') {
                loadAllUsers();
            }
            
            updateChatsList();
            updateCreateChatButtonVisibility();
        }

        function updateCreateChatButtonVisibility() {
            const createBtn = document.getElementById('createChatBtn');
            if (createBtn) {
                createBtn.style.display = currentTab === 'public' ? 'flex' : 'none';
            }
        }

        function handleSearch() {
            updateChatsList();
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function handleTextInput() {}

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('active');
        }

        function updateUrlWithChat(chat) {
            if (chat) {
                const newUrl = `${window.location.pathname}#${chat.id}`;
                window.history.replaceState({ chatId: chat.id }, chat.name, newUrl);
                let title = chat.name;
                if (chat.type === 'private' && currentUser) {
                    if (chat.pair_key === `${currentUser.id}_${currentUser.id}`) {
                        title = 'Избранное';
                    } else {
                        const otherId = chat.pair_key.split('_').find(id => id !== currentUser.id);
                        const otherUser = allUsers.find(u => u.id === otherId);
                        title = otherUser ? otherUser.username : 'Приватный чат';
                    }
                }
                document.title = `${title} - Telegram Web`;
            } else {
                const newUrl = window.location.pathname;
                window.history.replaceState({}, 'Telegram Web', newUrl);
                document.title = 'Telegram Web';
            }
        }

        function checkUrlForChat() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const chat = myChats.find(c => c.id === hash) || publicChats.find(c => c.id === hash);
                if (chat) setTimeout(() => joinChat(chat), 500);
            }
        }

        function openMedia(url) {
            const viewer = document.getElementById('mediaViewer');
            const content = document.getElementById('mediaViewerContent');
            if (url.match(/\.(mp4|webm|ogg)$/i) || url.includes('video')) {
                content.innerHTML = `<video src="${url}" controls autoplay></video>`;
            } else {
                content.innerHTML = `<img src="${url}" style="max-width: 100%; max-height: 100%;">`;
            }
            viewer.classList.add('active');
        }

        function closeMediaViewer() {
            document.getElementById('mediaViewer').classList.remove('active');
            document.getElementById('mediaViewerContent').innerHTML = '';
        }

        function updateBackButtonVisibility() {
            const backButton = document.getElementById('backButton');
            if (window.innerWidth <= 768) {
                backButton.classList.add('mobile-visible');
            } else {
                backButton.classList.remove('mobile-visible');
            }
        }

        function setupMobileHandlers() {
            const setVH = () => {
                const vh = window.innerHeight * 0.01;
                document.documentElement.style.setProperty('--vh', `${vh}px`);
            };
            
            setVH();
            window.addEventListener('resize', setVH);
            window.addEventListener('orientationchange', setVH);
            
            forceShowInput();
        }

        function scrollToBottomOnMobile() {
            setTimeout(() => {
                const container = document.getElementById('messagesContainer');
                if (container) {
                    container.scrollTo({
                        top: container.scrollHeight,
                        behavior: 'smooth'
                    });
                }
            }, 300);
        }

        function forceShowInput() {
            const inputContainer = document.getElementById('messageInputContainer');
            const emojiBtn = document.querySelector('.emoji-toggle-btn');
            const micBtn = document.getElementById('micBtn');
            const sendBtn = document.getElementById('sendBtn');
            
            if (inputContainer) {
                inputContainer.style.display = 'flex';
                inputContainer.style.visibility = 'visible';
                inputContainer.style.opacity = '1';
            }
            
            if (emojiBtn) {
                emojiBtn.style.display = 'flex';
                emojiBtn.style.visibility = 'visible';
                emojiBtn.style.opacity = '1';
            }
            
            if (micBtn) {
                micBtn.style.display = 'flex';
                micBtn.style.visibility = 'visible';
                micBtn.style.opacity = '1';
            }
            
            if (sendBtn) {
                sendBtn.style.display = 'flex';
                sendBtn.style.visibility = 'visible';
                sendBtn.style.opacity = '1';
            }
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function toggleEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            picker.style.display = picker.style.display === 'none' ? 'flex' : 'none';
        }

        function populateEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            picker.innerHTML = '';
            emojiList.forEach(emoji => {
                const btn = document.createElement('button');
                btn.className = 'emoji-btn';
                btn.textContent = emoji;
                btn.onclick = () => addEmoji(emoji);
                picker.appendChild(btn);
            });
        }

        function addEmoji(emoji) {
            const input = document.getElementById('messageInput');
            const start = input.selectionStart;
            const end = input.selectionEnd;
            input.value = input.value.substring(0, start) + emoji + input.value.substring(end);
            input.focus();
            input.selectionStart = input.selectionEnd = start + emoji.length;
            input.style.height = 'auto';
            input.style.height = input.scrollHeight + 'px';
        }

        function handleMessagesContainerClick(event) {
            if (activeMessageId) {
                const activeMessage = document.querySelector(`.message[data-id="${activeMessageId}"]`);
                if (activeMessage && !activeMessage.contains(event.target)) {
                    hideMessageActions();
                }
            }
        }

        function showMessageActions(messageId, event) {
            event.stopPropagation();
            
            if (activeMessageId) {
                const prevActive = document.querySelector(`.message-actions[data-message-id="${activeMessageId}"]`);
                if (prevActive) {
                    prevActive.classList.remove('visible');
                }
            }
            
            const actions = document.querySelector(`.message-actions[data-message-id="${messageId}"]`);
            if (actions) {
                actions.classList.add('visible');
                activeMessageId = messageId;
                
                setTimeout(() => {
                    if (activeMessageId === messageId) {
                        hideMessageActions();
                    }
                }, 5000);
            }
        }

        function hideMessageActions() {
            if (activeMessageId) {
                const actions = document.querySelector(`.message-actions[data-message-id="${activeMessageId}"]`);
                if (actions) {
                    actions.classList.remove('visible');
                }
                activeMessageId = null;
            }
        }

        function disableSendButton() {
            sendBtnDisabled = true;
            document.getElementById('sendBtn').classList.add('disabled');
            setTimeout(() => {
                sendBtnDisabled = false;
                document.getElementById('sendBtn').classList.remove('disabled');
            }, MESSAGE_COOLDOWN);
        }

        // ========== ОБРАБОТЧИКИ СОБЫТИЙ ==========
        window.addEventListener('popstate', function(event) {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const chat = myChats.find(c => c.id === hash) || publicChats.find(c => c.id === hash);
                if (chat) setTimeout(() => joinChat(chat), 500);
            } else {
                currentChat = null;
                renderMessages();
                updateUrlWithChat(null);
            }
        });

        window.addEventListener('resize', function() {
            updateBackButtonVisibility();
            if (window.innerWidth > 768) document.getElementById('sidebar').classList.remove('active');
            
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
            
            forceShowInput();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeMediaViewer();
                hideMessageActions();
                if (callModal && callModal.classList.contains('active')) {
                    endCall();
                }
            }
        });

        document.addEventListener('click', function(e) {
            const emojiPicker = document.getElementById('emojiPicker');
            const emojiBtn = document.querySelector('.emoji-toggle-btn');
            if (emojiPicker.style.display === 'flex' && !emojiPicker.contains(e.target) && !emojiBtn.contains(e.target)) {
                emojiPicker.style.display = 'none';
            }
        });

        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        document.addEventListener('DOMContentLoaded', () => {
            populateEmojiPicker();
            document.getElementById('loginModal').classList.add('active');
            init();
        });
    </script>
    <!-- ========== PRODUCTION ARCHITECTURE RECOMMENDATIONS ========== -->
    <!--
    1. Таблицы Supabase:
       profiles:
         - id (uuid, primary key)
         - username (text, unique)
         - avatar (text)
         - bio (text)
         - dnd (boolean)
         - last_seen (timestamp)
         - created_at (timestamp)
         Индексы: username, last_seen

       chats:
         - id (uuid, primary key)
         - name (text)
         - is_public (boolean)
         - type (text) - 'private' или 'public'
         - pair_key (text) - для приватных чатов хранит отсортированные ID через '_' (уникальный)
         - created_at (timestamp)
         Индексы: type, pair_key (unique for private)

       messages:
         - id (uuid, primary key)
         - chat_id (uuid, references chats)
         - sender_id (uuid, references profiles)
         - text (text)
         - audio (text)
         - duration (integer)
         - created_at (timestamp)
         - edited (boolean)
         Индексы: chat_id, sender_id, created_at

       calls:
         - id (uuid, primary key)
         - caller_id (uuid, references profiles)
         - receiver_id (uuid, references profiles)
         - status (text)
         - created_at (timestamp)
         - ended_at (timestamp)
         Индексы: caller_id, receiver_id, status, created_at

    2. Ably каналы:
       - chat:{chat_id} - для сообщений в чате
       - user:{user_id} - для персональных уведомлений (звонки, новые чаты)
       - presence:global - для онлайн статусов
       - global-chats - для новых публичных чатов

    3. RLS политики:
       messages:
         - INSERT: auth.uid() = sender_id
         - SELECT: auth.role() = 'authenticated'
         - UPDATE: auth.uid() = sender_id
         - DELETE: auth.uid() = sender_id OR is_admin()

       chats:
         - SELECT: auth.role() = 'authenticated'
         - INSERT: (is_public AND check_public_limit()) OR is_admin()
         - UPDATE: is_admin()
         - DELETE: is_admin()

       calls:
         - INSERT: auth.uid() = caller_id
         - SELECT: auth.uid() = caller_id OR auth.uid() = receiver_id
         - UPDATE: auth.uid() = caller_id OR auth.uid() = receiver_id

    4. Исправление ошибки duplicate key:
       - Использование maybeSingle() для безопасной проверки существования чата
       - Добавлен повторный запрос при возникновении ошибки уникальности
       - Правильная обработка всех возможных ошибок при создании чата
    -->
</body>
