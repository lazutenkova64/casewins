            function startCallTimer() {
                if (callTimerInterval) clearInterval(callTimerInterval);
                callStartTime = Date.now();
                callTimerInterval = setInterval(() => {
                    const elapsed = Date.now() - callStartTime;
                    if (elapsed >= 30 * 60 * 1000) { alert('Длительность звонка превысила 30 минут. Звонок завершён.'); endCall(); return; }
                    document.getElementById('callTimer').textContent = formatCallTime(elapsed);
                }, 1000);
            }

            async function answerCall() {
                if (!currentCall || !peerConnection) return;
                try {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(currentCall.offer));
                    for (const candidate of pendingCandidates) {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                    }
                    pendingCandidates = [];
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    if (currentCall.dbId) {
                        await supabase.from('calls').update({ status: 'active' }).eq('id', currentCall.dbId);
                    }
                    ably.channels.get('calls').publish('answer', {
                        callId: currentCall.id, answer, targetId: currentCall.callerId, senderId: currentUser.id
                    });
                    callState = 'active';
                    document.getElementById('callStatus').textContent = 'В разговоре';
                    startCallTimer();
                    if (callRingtone) { callRingtone.pause(); callRingtone.currentTime = 0; }
                    if (callAcceptedSound) callAcceptedSound.play().catch(() => {});
                    if (callTimeoutId) { clearTimeout(callTimeoutId); callTimeoutId = null; }
                } catch (err) {
                    console.error('answerCall error:', err);
                }
            }

            async function rejectCall() {
                if (currentCall) {
                    ably.channels.get('calls').publish('end', {
                        callId: currentCall.id, targetId: currentCall.callerId, senderId: currentUser.id
                    });
                    if (currentCall.dbId) await supabase.from('calls').update({ status: 'declined' }).eq('id', currentCall.dbId);
                }
                endCall();
            }

            function endCall() {
                if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
                if (peerConnection) { peerConnection.close(); peerConnection = null; }
                if (callTimerInterval) { clearInterval(callTimerInterval); callTimerInterval = null; }
                callStartTime = null;
                if (callTimeoutId) { clearTimeout(callTimeoutId); callTimeoutId = null; }
                if (callRingtone) { callRingtone.pause(); callRingtone.currentTime = 0; }
                if (callEndedSound) callEndedSound.play().catch(() => {});
                document.getElementById('callModal').classList.remove('active');
                callState = 'idle';
                currentCall = null;
                pendingCandidates = [];
            }

            function toggleMute() {
                if (!localStream) return;
                const audioTracks = localStream.getAudioTracks();
                const enabled = !audioTracks[0].enabled;
                audioTracks.forEach(t => t.enabled = enabled);
                const muteBtn = document.getElementById('muteCallBtn');
                if (!enabled) {
                    muteBtn.textContent = '🔴';
                    muteBtn.classList.add('muted');
                } else {
                    muteBtn.textContent = '🎤';
                    muteBtn.classList.remove('muted');
                }
            }

            async function updateCallStatusInDB(status) {
                if (currentCall && currentCall.dbId) {
                    await supabase.from('calls').update({ status }).eq('id', currentCall.dbId);
                }
            }

            function listenForIncomingCalls() {
                if (!ably || !currentUser) return;
                const callsChannel = ably.channels.get('calls');
                callsChannel.subscribe('offer', async msg => {
                    const { offer, callerId, callerName, callerAvatar, callId, dbCallId, targetId } = msg.data;
                    if (targetId !== currentUser.id) return;
                    if (callState !== 'idle') {
                        callsChannel.publish('end', { callId, targetId: callerId, senderId: currentUser.id });
                        return;
                    }
                    currentCall = { id: callId, dbId: dbCallId, callerId, callerName, callerAvatar, offer };
                    callState = 'ringing';
                    showIncomingCallModal(callerName, callerAvatar);

                    peerConnection = new RTCPeerConnection({ iceServers: ICE_SERVERS, iceCandidatePoolSize: 10 });
                    peerConnection.onicecandidate = event => {
                        if (event.candidate) {
                            callsChannel.publish('ice-candidate', {
                                callId, candidate: event.candidate, targetId: callerId, senderId: currentUser.id
                            });
                        }
                    };
                    peerConnection.ontrack = event => {
                        const remoteStream = event.streams[0];
                        const audioEl = document.createElement('audio');
                        audioEl.srcObject = remoteStream;
                        audioEl.autoplay = true;
                        audioEl.controls = false;
                        audioEl.style.display = 'none';
                        document.body.appendChild(audioEl);
                        callState = 'active';
                        document.getElementById('callStatus').textContent = 'В разговоре';
                        if (!callTimerInterval) startCallTimer();
                    };
                    peerConnection.oniceconnectionstatechange = () => {
                        if (peerConnection.iceConnectionState === 'failed' || peerConnection.iceConnectionState === 'disconnected') {
                            peerConnection.restartIce();
                        }
                    };
                    peerConnection.onconnectionstatechange = () => {
                        if (peerConnection.connectionState === 'failed' || peerConnection.connectionState === 'closed') {
                            endCall();
                        }
                    };

                    callTimeoutId = setTimeout(() => {
                        if (callState === 'ringing') {
                            updateCallStatusInDB('missed');
                            endCall();
                        }
                    }, CALL_TIMEOUT);
                });

                callsChannel.subscribe('answer', async msg => {
                    const { answer, callId, targetId } = msg.data;
                    if (targetId !== currentUser.id || !currentCall || currentCall.id !== callId) return;
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                    for (const candidate of pendingCandidates) {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                    }
                    pendingCandidates = [];
                    if (currentCall.dbId) await supabase.from('calls').update({ status: 'active' }).eq('id', currentCall.dbId);
                    callState = 'active';
                    document.getElementById('callStatus').textContent = 'В разговоре';
                    startCallTimer();
                    if (callTimeoutId) { clearTimeout(callTimeoutId); callTimeoutId = null; }
                    if (callAcceptedSound) callAcceptedSound.play().catch(() => {});
                });

                callsChannel.subscribe('ice-candidate', async msg => {
                    const { candidate, callId, targetId } = msg.data;
                    if (targetId !== currentUser.id || !currentCall || currentCall.id !== callId) return;
                    if (!peerConnection) return;
                    if (peerConnection.remoteDescription) {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                    } else {
                        pendingCandidates.push(candidate);
                    }
                });

                callsChannel.subscribe('end', msg => {
                    const { callId, targetId } = msg.data;
                    if (targetId !== currentUser.id || !currentCall || currentCall.id !== callId) return;
                    endCall();
                });
            }

                    items = [...myChats].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                            id: u.id,
                            name: u.username,

                            isAdmin: u.username === ADMIN_USERNAME,
                            dnd: onlineUsers[u.id] ? onlineUsers[u.id].dnd : (u.dnd || false),
                            lastSeen: onlineUsers[u.id] ? onlineUsers[u.id].lastSeen : (u.last_seen ? new Date(u.last_seen).getTime() : null)

                if (searchTerm) {
                    items = items.filter(item => (item.name || '').toLowerCase().includes(searchTerm) || (item.bio || '').toLowerCase().includes(searchTerm));
                }
                let newHTML = '';
                if (items.length === 0) {

                    const fragment = [];
                    items.forEach(item => {
                        if (currentTab === 'users') fragment.push(renderUserItem(item));

                    });
                    newHTML = fragment.join('');

                    <div class="chat-item" onclick="createPrivateChat({id: '${user.id}', name: '${user.name}', avatar: '${user.avatar}'})">

                                </div>
                            </div>

            function renderChatItem(chat) {
                const lastMsg = messages[chat.id] && messages[chat.id].length > 0 ? messages[chat.id][messages[chat.id].length - 1] : null;

                let lastMessageText = 'Нет сообщений';
                if (lastMsg) lastMessageText = lastMsg.text ? lastMsg.text : (lastMsg.audio ? '🎤 Голосовое' : '📷 Медиа');
                const timeText = lastMsg ? lastMsg.time : '';

                if (chat.type === 'private' && currentUser) {
                    displayName = chat.otherUserName || 'Приватный чат';
                }
                return `
                    <div class="chat-item ${currentChat?.id === chat.id ? 'active' : ''}" onclick="joinChat(${JSON.stringify(chat).replace(/"/g, '&quot;')})">
                        <div class="chat-avatar">${chat.avatar || '👥'}</div>

                            <div class="chat-name">

                                ${chat.is_public ? '<span class="lock-icon">🌐</span>' : '<span class="lock-icon">🔒</span>'}

                            </div>

                        </div>

            async function logout() {

                if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
                if (peerConnection) { peerConnection.close(); peerConnection = null; }
                if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
                Object.values(audioElements).forEach(audio => { if (audio) { audio.pause(); audio.currentTime = 0; } });
                audioElements = {};
                activeAudio = null; activeAudioId = null;
                if (audioUpdateInterval) { clearInterval(audioUpdateInterval); audioUpdateInterval = null; }
                await updateUserLastSeen();
                await supabase.auth.signOut();
                if (heartbeatInterval) { clearInterval(heartbeatInterval); heartbeatInterval = null; }
                if (presenceUpdateInterval) { clearInterval(presenceUpdateInterval); presenceUpdateInterval = null; }
                if (statusUpdateInterval) { clearInterval(statusUpdateInterval); statusUpdateInterval = null; }
                if (ably) {
                    try {
                        const presenceChannel = ably.channels.get('presence');
                        presenceChannel.presence.leave();
                        ably.close();
                    } catch (e) {}
                    ably = null;
                }
                localStorage.removeItem('currentUser');

                document.getElementById('registerPassword').value = '';
                document.getElementById('registerConfirmPassword').value = '';
            }

            function setupMobileHandlers() {
                const setVH = () => {
                    const vh = window.innerHeight * 0.01;
                    document.documentElement.style.setProperty('--vh', `${vh}px`);
                };
                setVH();
                window.addEventListener('resize', setVH);
                window.addEventListener('orientationchange', setVH);
                forceShowInput();
            }

            function scrollToBottomOnMobile() {
                setTimeout(() => {
                    const container = document.getElementById('messagesContainer');
                    if (container) container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
                }, 300);
            }

            function forceShowInput() {
                const inputContainer = document.getElementById('messageInputContainer');
                const emojiBtn = document.querySelector('.emoji-toggle-btn');
                const micBtn = document.getElementById('micBtn');
                const sendBtn = document.getElementById('sendBtn');
                if (inputContainer) { inputContainer.style.display = 'flex'; inputContainer.style.visibility = 'visible'; inputContainer.style.opacity = '1'; }
                if (emojiBtn) { emojiBtn.style.display = 'flex'; emojiBtn.style.visibility = 'visible'; emojiBtn.style.opacity = '1'; }
                if (micBtn) { micBtn.style.display = 'flex'; micBtn.style.visibility = 'visible'; micBtn.style.opacity = '1'; }
                if (sendBtn) { sendBtn.style.display = 'flex'; sendBtn.style.visibility = 'visible'; sendBtn.style.opacity = '1'; }
            }

            function togglePassword(inputId) {
                const input = document.getElementById(inputId);
                input.type = input.type === 'password' ? 'text' : 'password';
            }

            function toggleEmojiPicker() {
                const picker = document.getElementById('emojiPicker');
                picker.style.display = picker.style.display === 'none' ? 'flex' : 'none';
            }

            function populateEmojiPicker() {
                const picker = document.getElementById('emojiPicker');
                picker.innerHTML = '';
                emojiList.forEach(emoji => {
                    const btn = document.createElement('button');
                    btn.className = 'emoji-btn';
                    btn.textContent = emoji;
                    btn.onclick = () => addEmoji(emoji);
                    picker.appendChild(btn);
                });
            }

            function addEmoji(emoji) {
                const input = document.getElementById('messageInput');
                const start = input.selectionStart;
                const end = input.selectionEnd;
                input.value = input.value.substring(0, start) + emoji + input.value.substring(end);
                input.focus();
                input.selectionStart = input.selectionEnd = start + emoji.length;
                input.style.height = 'auto';
                input.style.height = input.scrollHeight + 'px';
            }

            function handleMessagesContainerClick(event) {
                if (activeMessageId) {
                    const active = document.querySelector(`.message[data-id="${activeMessageId}"]`);
                    if (active && !active.contains(event.target)) hideMessageActions();
                }
            }

            function showMessageActions(messageId, event) {
                event.stopPropagation();
                if (activeMessageId) {
                    const prev = document.querySelector(`.message-actions[data-message-id="${activeMessageId}"]`);
                    if (prev) prev.classList.remove('visible');
                }
                const actions = document.querySelector(`.message-actions[data-message-id="${messageId}"]`);
                if (actions) {
                    actions.classList.add('visible');
                    activeMessageId = messageId;
                    setTimeout(() => { if (activeMessageId === messageId) hideMessageActions(); }, 5000);
                }
            }

            function hideMessageActions() {
                if (activeMessageId) {
                    const actions = document.querySelector(`.message-actions[data-message-id="${activeMessageId}"]`);
                    if (actions) actions.classList.remove('visible');
                    activeMessageId = null;
                }
            }

            function disableSendButton() {
                sendBtnDisabled = true;
                document.getElementById('sendBtn').classList.add('disabled');
                setTimeout(() => { sendBtnDisabled = false; document.getElementById('sendBtn').classList.remove('disabled'); }, MESSAGE_COOLDOWN);
            }

            // === СЕРДЦЕБИЕНИЕ ===
            let heartbeatInterval, presenceUpdateInterval, statusUpdateInterval;
            function startHeartbeat() {
                if (heartbeatInterval) clearInterval(heartbeatInterval);
                heartbeatInterval = setInterval(() => {
                    if (ably && ably.connection.state === 'connected' && currentUser) {
                        const presenceChannel = ably.channels.get('presence');
                        if (presenceChannel.state === 'attached') {
                            presenceChannel.presence.update({
                                name: currentUser.name, avatar: currentUser.avatar || '👤',
                                bio: currentUser.bio || '', isAdmin: currentUser.isAdmin || false,
                                dnd: currentUser.dnd || false, lastSeen: Date.now()
                            });
                        }
                    }
                }, 30000);
            }

            function startPresenceUpdates() {
                if (presenceUpdateInterval) clearInterval(presenceUpdateInterval);
                presenceUpdateInterval = setInterval(() => {
                    if (ably && ably.connection.state === 'connected' && currentUser) {
                        const presenceChannel = ably.channels.get('presence');
                        if (presenceChannel.state === 'attached') {
                            presenceChannel.presence.update({
                                name: currentUser.name, avatar: currentUser.avatar || '👤',
                                bio: currentUser.bio || '', isAdmin: currentUser.isAdmin || false,
                                dnd: currentUser.dnd || false, lastSeen: Date.now()
                            });
                        }
                    }
                }, 30000);
            }

            function startStatusUpdates() {
                if (statusUpdateInterval) clearInterval(statusUpdateInterval);
                statusUpdateInterval = setInterval(() => {
                    if (currentTab === 'users' || currentTab === 'chats') updateChatsList();
                    updateChatStatus();
                }, 2000);
            }

            async function handleBeforeUnload() {
                if (currentUser && ably) {
                    await updateUserLastSeen();
                    const presenceChannel = ably.channels.get('presence');
                    presenceChannel.presence.leave();
                }
            }

            // === ИНИЦИАЛИЗАЦИЯ ===
            document.addEventListener('DOMContentLoaded', () => {
                populateEmojiPicker();
                init();
            });

            // === ЭКСПОРТ В ГЛОБАЛЬНУЮ ОБЛАСТЬ ===
            window.login = login;
            window.register = register;
            window.logout = logout;
            window.switchAuthMode = switchAuthMode;
            window.togglePassword = togglePassword;
            window.openCreateChatModal = openCreateChatModal;
            window.closeCreateChatModal = closeCreateChatModal;
            window.createPublicChat = createPublicChat;
            window.createPrivateChat = createPrivateChat;
            window.joinChat = joinChat;
            window.deleteChat = deleteChat;
            window.switchTab = switchTab;
            window.handleSearch = handleSearch;
            window.toggleSidebar = toggleSidebar;
            window.openProfileModal = openProfileModal;
            window.closeProfileModal = closeProfileModal;
            window.saveProfile = saveProfile;
            window.openAvatarModal = openAvatarModal;
            window.closeAvatarModal = closeAvatarModal;
            window.saveAvatar = saveAvatar;
            window.openChatUserProfile = openChatUserProfile;
            window.closeUserProfileModal = closeUserProfileModal;
            window.sendMessage = sendMessage;
            window.handleKeyPress = handleKeyPress;
            window.handleTextInput = handleTextInput;
            window.scrollToBottomOnMobile = scrollToBottomOnMobile;
            window.toggleRecording = toggleRecording;
            window.toggleEmojiPicker = toggleEmojiPicker;
            window.addEmoji = addEmoji;
            window.showMessageActions = showMessageActions;
            window.hideMessageActions = hideMessageActions;
            window.deleteMessage = deleteMessage;
            window.editMessage = editMessage;
            window.closeEditMessageModal = closeEditMessageModal;
            window.saveEditedMessage = saveEditedMessage;
            window.openMedia = openMedia;
            window.closeMediaViewer = closeMediaViewer;
            window.toggleAudio = toggleAudio;
            window.seekAudio = seekAudio;
            window.startCall = startCall;
            window.answerCall = answerCall;
            window.rejectCall = rejectCall;
            window.endCall = endCall;
            window.toggleMute = toggleMute;
        })();
    </script>
</body>
</html>
