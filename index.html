        function setupMobileKeyboardHandlers() {

                    const emojiBtn = document.querySelector('.emoji-toggle-btn');

                        document.body.classList.remove('keyboard-open');

            });

                    if (container) {

                        .from('users')
                        .select('*')
                        .eq('id', parsedUser.id)

        // ========== Ably и чаты ==========
        function initAbly() {
            if (!currentUser) return;
            
            if (ably) {
                try {
                    ably.close();
                } catch (e) {}
            }
            
            ably = new Ably.Realtime({
                key: ABLY_API_KEY,
                clientId: currentUser.id,
                transports: ['web_socket'],
                disconnectedRetryTimeout: 1000,
                suspendedRetryTimeout: 2000,
                realtimeRequestTimeout: 5000,
                echoMessages: false
            });

            ably.connection.on('connected', () => {
                console.log('✅ Connected to Ably');
                
                const presenceChannel = ably.channels.get('presence');
                presenceChannel.presence.enter({ 
                    name: currentUser.name, 
                    avatar: currentUser.avatar || '👤',
                    bio: currentUser.bio || '',
                    isAdmin: currentUser.isAdmin,
                    dnd: currentUser.dnd || false
                });
                
                presenceChannel.presence.subscribe('enter', (member) => {
                    if (member.clientId !== currentUser.id) {
                        onlineUsers[member.clientId] = {
                            id: member.clientId,
                            name: member.data.name,
                            avatar: member.data.avatar || '👤',
                            bio: member.data.bio || '',
                            online: true,
                            isAdmin: member.data.isAdmin || false,
                            dnd: member.data.dnd || false
                        };
                        if (currentTab === 'users') updateChatsList();
                    }
                });
                
                presenceChannel.presence.subscribe('update', (member) => {
                    if (member.clientId !== currentUser.id && onlineUsers[member.clientId]) {
                        onlineUsers[member.clientId] = {
                            ...onlineUsers[member.clientId],
                            name: member.data.name,
                            avatar: member.data.avatar,
                            bio: member.data.bio,
                            isAdmin: member.data.isAdmin,
                            dnd: member.data.dnd
                        };
                        if (currentTab === 'users') updateChatsList();
                    }
                });
                
                presenceChannel.presence.subscribe('leave', (member) => {
                    if (onlineUsers[member.clientId]) {
                        delete onlineUsers[member.clientId];
                        if (currentTab === 'users') updateChatsList();
                    }
                });
                
                presenceChannel.presence.get((err, members) => {
                    if (members) {
                        members.forEach(member => {
                            if (member.clientId !== currentUser.id) {
                                onlineUsers[member.clientId] = {
                                    id: member.clientId,
                                    name: member.data.name,
                                    avatar: member.data.avatar || '👤',
                                    bio: member.data.bio || '',
                                    online: true,
                                    isAdmin: member.data.isAdmin || false,
                                    dnd: member.data.dnd || false
                                };
                            }
                        });
                    }
                    if (currentTab === 'users') updateChatsList();
                });

                const globalChatsChannel = ably.channels.get('global-chats');
                globalChatsChannel.subscribe('new-chat', (message) => {
                    const newChat = message.data;
                    if (!publicChats.find(c => c.id === newChat.id)) {
                        publicChats.push(newChat);
                        localStorage.setItem('publicChats', JSON.stringify(publicChats));
                        if (currentTab === 'public') updateChatsList();
                    }
                });

                const adminChannel = ably.channels.get('admin-actions');
                adminChannel.subscribe('delete-chat', (message) => {
                    const { chatId } = message.data;
                    publicChats = publicChats.filter(c => c.id !== chatId);
                    localStorage.setItem('publicChats', JSON.stringify(publicChats));
                    myChats = myChats.filter(c => c.id !== chatId);
                    localStorage.setItem(`myChats_${currentUser.id}`, JSON.stringify(myChats));
                    if (messages[chatId]) {
                        delete messages[chatId];
                        saveMessagesDebounced();
                    }
                    if (currentChat && currentChat.id === chatId) {
                        currentChat = null;
                        document.getElementById('messagesContainer').innerHTML = '<div class="chat-deleted-message">⚠️ Чат был удален администратором</div>';
                        document.getElementById('currentChatName').innerHTML = 'Чат удален';
                        document.getElementById('chatStatus').innerHTML = '';
                        updateUrlWithChat(null);
                    }
                    updateChatsList();
                });

                adminChannel.subscribe('delete-message', (message) => {
                    const { chatId, messageId } = message.data;
                    if (!deletedMessages[chatId]) deletedMessages[chatId] = [];
                    if (!deletedMessages[chatId].includes(messageId)) {
                        deletedMessages[chatId].push(messageId);
                        localStorage.setItem('deletedMessages', JSON.stringify(deletedMessages));
                    }
                    if (messages[chatId]) {
                        messages[chatId] = messages[chatId].filter(m => m.id !== messageId);
                        saveMessagesDebounced();
                        if (currentChat && currentChat.id === chatId) renderMessages();
                        updateChatsList();
                    }
                });

                myChats.forEach(chat => subscribeToChat(chat));
            });

            ably.connection.on('disconnected', () => {
                console.log('⚠️ Disconnected from Ably, reconnecting...');
            });

            ably.connection.on('suspended', () => {
                console.warn('⚠️ Connection suspended, will retry...');
            });

            ably.connection.on('failed', (err) => {
                console.error('❌ Connection failed:', err);
                if (reconnectTimeout) clearTimeout(reconnectTimeout);
                reconnectTimeout = setTimeout(() => {
                    if (currentUser) initAbly();
                }, 5000);
            });

            updateChatsList();
        }

        function subscribeToChat(chat) {
            if (!ably) return;
            const chatChannel = ably.channels.get(`chat-${chat.id}`);
            chatChannel.unsubscribe();
            
            chatChannel.subscribe('message', (message) => {
                const msg = message.data;
                if (deletedMessages[chat.id] && deletedMessages[chat.id].includes(msg.id)) return;
                if (!messages[chat.id]) messages[chat.id] = [];
                
                const exists = messages[chat.id].some(m => m.id === msg.id);
                if (!exists) {
                    messages[chat.id].push({
                        ...msg,
                        type: msg.sender === currentUser.id ? 'out' : 'in'
                    });
                    messages[chat.id].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                    
                    if (msg.sender !== currentUser.id) {
                        sendDeliveryReceipt(chat.id, msg.id);
                    }
                    
                    updateChatLastMessageTime(chat.id, msg.timestamp);
                    
                    if (currentChat?.id !== chat.id && msg.sender !== currentUser.id) {
                        unreadCounts[chat.id] = (unreadCounts[chat.id] || 0) + 1;
                        localStorage.setItem('unreadCounts', JSON.stringify(unreadCounts));
                    }
                    
                    saveMessagesDebounced();
                    
                    if (currentChat && currentChat.id === chat.id) {
                        renderMessages(true);
                        unreadCounts[chat.id] = 0;
                        localStorage.setItem('unreadCounts', JSON.stringify(unreadCounts));
                        
                        markMessagesAsRead(chat.id);
                    }
                    
                    updateChatsList();
                }
            });
            
            chatChannel.subscribe('delivery_receipt', (data) => {
                const { messageId } = data.data;
                if (!deliveredMessages[currentChat?.id]) deliveredMessages[currentChat?.id] = [];
                if (!deliveredMessages[currentChat?.id].includes(messageId)) {
                    deliveredMessages[currentChat?.id].push(messageId);
                    localStorage.setItem('deliveredMessages', JSON.stringify(deliveredMessages));
                    
                    if (messageStatuses[messageId]) {
                        messageStatuses[messageId].status = 'delivered';
                        messageStatuses[messageId].deliveredAt = Date.now();
                    } else {
                        messageStatuses[messageId] = { status: 'delivered', deliveredAt: Date.now() };
                    }
                    saveMessagesDebounced();
                    
                    if (currentChat && currentChat.id === chat.id) {
                        renderMessages(true);
                    }
                }
            });
            
            chatChannel.subscribe('read_receipt', (data) => {
                const { messageId } = data.data;
                if (messageStatuses[messageId]) {
                    messageStatuses[messageId].status = 'read';
                    messageStatuses[messageId].readAt = Date.now();
                } else {
                    messageStatuses[messageId] = { status: 'read', readAt: Date.now() };
                }
                saveMessagesDebounced();
                
                if (currentChat && currentChat.id === chat.id) {
                    renderMessages(true);
                }
            });
            
            chatChannel.subscribe('delete', (data) => {
                const { messageId } = data.data;
                if (!deletedMessages[chat.id]) deletedMessages[chat.id] = [];
                if (!deletedMessages[chat.id].includes(messageId)) {
                    deletedMessages[chat.id].push(messageId);
                    localStorage.setItem('deletedMessages', JSON.stringify(deletedMessages));
                }
                if (messages[chat.id]) {
                    messages[chat.id] = messages[chat.id].filter(m => m.id !== messageId);
                    saveMessagesDebounced();
                    if (currentChat?.id === chat.id) renderMessages(true);
                    updateChatsList();
                }
            });
            
            chatChannel.subscribe('edit', (data) => {
                const { messageId, newText } = data.data;
                if (messages[chat.id]) {
                    const msgIndex = messages[chat.id].findIndex(m => m.id === messageId);
                    if (msgIndex !== -1) {
                        messages[chat.id][msgIndex].text = newText;
                        messages[chat.id][msgIndex].edited = true;
                        saveMessagesDebounced();
                        if (currentChat?.id === chat.id) renderMessages(true);
                    }
                }
            });
            
            chatChannel.history({ limit: 200 }, (err, resultPage) => {
                if (resultPage && resultPage.items.length > 0) {
                    if (!messages[chat.id]) messages[chat.id] = [];
                    resultPage.items.forEach(item => {
                        const msg = item.data;
                        if (deletedMessages[chat.id] && deletedMessages[chat.id].includes(msg.id)) return;
                        const exists = messages[chat.id].some(m => m.id === msg.id);
                        if (!exists) {
                            messages[chat.id].push({
                                ...msg,
                                type: msg.sender === currentUser.id ? 'out' : 'in'
                            });
                        }
                    });
                    messages[chat.id].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                    saveMessagesDebounced();
                    if (currentChat?.id === chat.id) {
                        renderMessages(true);
                        unreadCounts[chat.id] = 0;
                        localStorage.setItem('unreadCounts', JSON.stringify(unreadCounts));
                        markMessagesAsRead(chat.id);
                    }
                }
            });
        }

        function sendDeliveryReceipt(chatId, messageId) {
            if (!ably) return;
            const chatChannel = ably.channels.get(`chat-${chatId}`);
            chatChannel.publish('delivery_receipt', { 
                messageId, 
                receiver: currentUser.id,
                timestamp: Date.now() 
            });
        }

        function markMessagesAsRead(chatId) {
            if (!ably || !messages[chatId]) return;
            
            messages[chatId].forEach(msg => {
                if (msg.sender !== currentUser.id && 
                    (!messageStatuses[msg.id] || messageStatuses[msg.id].status !== 'read')) {
                    
                    if (!messageStatuses[msg.id]) {
                        messageStatuses[msg.id] = { status: 'read', readAt: Date.now() };
                    } else {
                        messageStatuses[msg.id].status = 'read';
                        messageStatuses[msg.id].readAt = Date.now();
                    }
                    
                    const chatChannel = ably.channels.get(`chat-${chatId}`);
                    chatChannel.publish('read_receipt', { 
                        messageId: msg.id, 
                        reader: currentUser.id,
                        timestamp: Date.now() 
                    });
                }
            });
            saveMessagesDebounced();
        }

        function updateChatLastMessageTime(chatId, timestamp) {
            const chat = myChats.find(c => c.id === chatId);
            if (chat) {
                chat.lastMessageTime = timestamp || Date.now();
                myChats.sort((a, b) => (b.lastMessageTime || 0) - (a.lastMessageTime || 0));
                localStorage.setItem(`myChats_${currentUser.id}`, JSON.stringify(myChats));
            }
        }

        // ========== Аутентификация через Supabase ==========
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const remember = document.getElementById('rememberMe').checked;
            
            if (!username || !password) {
                alert('Введите имя и пароль');
                return;
            }
            
            try {
                const { data: users, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('username', username)
                    .eq('password', password);
                
                if (error) throw error;
                
                if (users && users.length > 0) {
                    const user = users[0];
                    const isAdmin = username === ADMIN_USERNAME;
                    
                    currentUser = {
                        id: user.id,
                        name: user.username,
                        avatar: user.avatar || '👤',
                        bio: user.bio || '',
                        isAdmin: isAdmin,
                        dnd: user.dnd || false
                    };
                    
                    if (remember) {
                        localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    }
                    
                    myChats = JSON.parse(localStorage.getItem(`myChats_${currentUser.id}`)) || [];
                    
                    document.getElementById('loginModal').classList.remove('active');
                    document.getElementById('appContainer').style.display = 'flex';
                    
                    updateProfileUI();
                    
                    initAbly();
                    startHeartbeat();
                    checkUrlForChat();
                } else {
                    alert('Неверное имя пользователя или пароль');
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('Ошибка при входе: ' + error.message);
            }
        }

        async function register() {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const remember = document.getElementById('rememberMeRegister').checked;
            
            if (!username || !password) {
                alert('Заполните все поля');
                return;
            }
            if (password !== confirmPassword) {
                alert('Пароли не совпадают');
                return;
            }
            if (password.length < 3) {
                alert('Пароль должен быть минимум 3 символа');
                return;
            }
            
            try {
                const { data: existingUsers, error: checkError } = await supabase
                    .from('users')
                    .select('username')
                    .eq('username', username);
                
                if (checkError) throw checkError;
                
                if (existingUsers && existingUsers.length > 0) {
                    alert('Пользователь с таким именем уже существует');
                    return;
                }
                
                const isAdmin = username === ADMIN_USERNAME;
                const newUser = {
                    username: username,
                    password: password,
                    avatar: '👤',
                    bio: '',
                    dnd: false,
                    created_at: new Date().toISOString()
                };
                
                const { data, error } = await supabase
                    .from('users')
                    .insert([newUser])
                    .select();
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    const user = data[0];
                    currentUser = {
                        id: user.id,
                        name: user.username,
                        avatar: user.avatar || '👤',
                        bio: user.bio || '',
                        isAdmin: isAdmin,
                        dnd: false
                    };
                    
                    if (remember) {
                        localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    }
                    
                    document.getElementById('loginModal').classList.remove('active');
                    document.getElementById('appContainer').style.display = 'flex';
                    
                    updateProfileUI();
                    
                    initAbly();
                    startHeartbeat();
                }
            } catch (error) {
                console.error('Registration error:', error);
                alert('Ошибка при регистрации: ' + error.message);
            }
        }

        function logout() {
            if (mediaRecorder && isRecording) {
                stopRecording();
            }
            
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            
            Object.values(audioElements).forEach(audio => {
                if (audio) {
                    audio.pause();
                    audio.currentTime = 0;
                }
            });
            audioElements = {};
            activeAudio = null;
            activeAudioId = null;
            
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
            if (reconnectTimeout) {
                clearTimeout(reconnectTimeout);
                reconnectTimeout = null;
            }
            if (saveMessagesTimeout) {
                clearTimeout(saveMessagesTimeout);
                saveMessagesTimeout = null;
            }
            if (recordingTimeout) {
                clearTimeout(recordingTimeout);
                recordingTimeout = null;
            }
            
            if (ably) {
                try {
                    myChats.forEach(chat => {
                        const channel = ably.channels.get(`chat-${chat.id}`);
                        channel.unsubscribe();
                    });
                    
                    const presenceChannel = ably.channels.get('presence');
                    presenceChannel.presence.leave();
                    
                    ably.close();
                } catch (e) {
                    console.error('Error closing Ably:', e);
                }
                ably = null;
            }
            
            localStorage.removeItem('currentUser');
            currentUser = null;
            currentChat = null;
            myChats = [];
            onlineUsers = {};
            
            document.getElementById('appContainer').style.display = 'none';
            document.getElementById('loginModal').classList.add('active');
            updateUrlWithChat(null);
            
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('registerUsername').value = '';
            document.getElementById('registerPassword').value = '';
            document.getElementById('registerConfirmPassword').value = '';
        }

        // ========== Отправка сообщений ==========
        function sendMessage() {
            if (sendBtnDisabled) {
                alert('Слишком часто! Подождите секунду.');
                return;
            }

            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!currentChat) {
                alert('Сначала выберите чат');
                return;
            }
            if (!text) return;
            
            disableSendButton();

            if (!myChats.find(c => c.id === currentChat.id)) {
                myChats.push(currentChat);
                localStorage.setItem(`myChats_${currentUser.id}`, JSON.stringify(myChats));
                if (ably) subscribeToChat(currentChat);
            }
            
            const now = new Date();
            const timeString = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            const messageId = Date.now().toString() + Math.random().toString(36).substr(2, 5);
            const timestamp = Date.now();
            
            messageStatuses[messageId] = { status: 'sent', sentAt: timestamp };
            
            const message = {
                id: messageId,
                chatId: currentChat.id,
                sender: currentUser.id,
                senderName: currentUser.name,
                text: text,
                time: timeString,
                isAdmin: currentUser.isAdmin || false,
                timestamp: timestamp,
                status: 'sent'
            };
            
            if (!messages[currentChat.id]) messages[currentChat.id] = [];
            messages[currentChat.id].push({ ...message, type: 'out' });
            messages[currentChat.id].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
            
            saveMessagesDebounced();
            
            updateChatLastMessageTime(currentChat.id, timestamp);
            
            if (ably) {
                const chatChannel = ably.channels.get(`chat-${currentChat.id}`);
                chatChannel.publish('message', message);
            }
            
            input.value = '';
            input.style.height = 'auto';
            renderMessages(true);
            updateChatsList();
        }

        async function sendAudioMessage(audioBlob, duration) {
            if (!currentChat) {
                alert('Сначала выберите чат');
                return;
            }

            if (!myChats.find(c => c.id === currentChat.id)) {
                myChats.push(currentChat);
                localStorage.setItem(`myChats_${currentUser.id}`, JSON.stringify(myChats));
                if (ably) subscribeToChat(currentChat);
            }

            const now = new Date();
            const timeString = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            const messageId = Date.now().toString() + Math.random().toString(36).substr(2, 5);
            const timestamp = Date.now();

            messageStatuses[messageId] = { status: 'pending', sentAt: timestamp };

            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = () => {
                const base64Audio = reader.result;

                const message = {
                    id: messageId,
                    chatId: currentChat.id,
                    sender: currentUser.id,
                    senderName: currentUser.name,
                    audio: base64Audio,
                    duration: duration,
                    time: timeString,
                    isAdmin: currentUser.isAdmin || false,
                    timestamp: timestamp,
                    status: 'pending'
                };

                if (!messages[currentChat.id]) messages[currentChat.id] = [];
                messages[currentChat.id].push({ ...message, type: 'out' });
                messages[currentChat.id].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

                saveMessagesDebounced();

                updateChatLastMessageTime(currentChat.id, timestamp);

                if (ably) {
                    const chatChannel = ably.channels.get(`chat-${currentChat.id}`);
                    chatChannel.publish('message', message);
                    
                    setTimeout(() => {
                        if (messageStatuses[messageId]) {
                            messageStatuses[messageId].status = 'sent';
                            saveMessagesDebounced();
                            renderMessages(true);
                        }
                    }, 500);
                }

                renderMessages(true);
                updateChatsList();
            };
        }

        function disableSendButton() {
            sendBtnDisabled = true;
            document.getElementById('sendBtn').style.opacity = '0.5';
            document.getElementById('sendBtn').style.pointerEvents = 'none';
            setTimeout(() => {
                sendBtnDisabled = false;
                document.getElementById('sendBtn').style.opacity = '1';
                document.getElementById('sendBtn').style.pointerEvents = 'auto';
            }, MESSAGE_COOLDOWN);
        }

        // ========== Голосовые сообщения и аудиоплеер ==========
        async function startRecording() {
            if (isRecording) return;
            if (!currentChat) {
                alert('Сначала выберите чат');
                return;
            }
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert('Ваш браузер не поддерживает запись аудио');
                return;
            }
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(mediaStream);
                audioChunks = [];

                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const duration = Math.round(audioBlob.size / 16000);
                    
                    if (mediaStream) {
                        mediaStream.getTracks().forEach(track => track.stop());
                        mediaStream = null;
                    }
                    
                    if (audioBlob.size > 0) {
                        sendAudioMessage(audioBlob, duration);
                    }
                };

                mediaRecorder.start();
                isRecording = true;
                document.getElementById('micBtn').classList.add('recording');
                
                recordingTimeout = setTimeout(() => {
                    if (isRecording) stopRecording();
                }, 60000);
            } catch (err) {
                alert('Не удалось получить доступ к микрофону');
                console.error(err);
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('micBtn').classList.remove('recording');
                if (recordingTimeout) {
                    clearTimeout(recordingTimeout);
                    recordingTimeout = null;
                }
            }
        }

        function toggleAudio(messageId, audioSrc) {
            if (activeAudioId === messageId && activeAudio) {
                if (!activeAudio.paused) {
                    activeAudio.pause();
                } else {
                    activeAudio.play().catch(e => console.error('Play failed:', e));
                }
                return;
            }
            
            if (activeAudio) {
                activeAudio.pause();
                activeAudio.currentTime = 0;
                updateAudioButton(activeAudioId, false);
            }
            
            if (!audioElements[messageId]) {
                audioElements[messageId] = new Audio(audioSrc);
                audioElements[messageId].addEventListener('timeupdate', () => updateAudioProgress(messageId));
                audioElements[messageId].addEventListener('ended', () => {
                    updateAudioButton(messageId, false);
                    updateAudioProgress(messageId);
                });
                audioElements[messageId].addEventListener('pause', () => updateAudioButton(messageId, false));
                audioElements[messageId].addEventListener('play', () => updateAudioButton(messageId, true));
            }
            
            activeAudio = audioElements[messageId];
            activeAudioId = messageId;
            
            activeAudio.play().catch(e => console.error('Play failed:', e));
        }

        function updateAudioButton(messageId, isPlaying) {
            const btn = document.querySelector(`.play-pause-btn[data-message-id="${messageId}"]`);
            if (btn) {
                btn.textContent = isPlaying ? '⏸️' : '▶️';
            }
        }

        function updateAudioProgress(messageId) {
            const audio = audioElements[messageId];
            if (!audio) return;
            
            const progressFill = document.querySelector(`.audio-progress-fill[data-message-id="${messageId}"]`);
            const timeDisplay = document.querySelector(`.audio-time[data-message-id="${messageId}"]`);
            
            if (progressFill) {
                const percent = (audio.currentTime / audio.duration) * 100 || 0;
                progressFill.style.width = percent + '%';
            }
            
            if (timeDisplay) {
                const current = formatTime(audio.currentTime);
                const total = formatTime(audio.duration);
                timeDisplay.textContent = `${current}/${total}`;
            }
        }

        function seekAudio(messageId, event) {
            const audio = audioElements[messageId];
            if (!audio) return;
            
            const progressBar = event.currentTarget;
            const rect = progressBar.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const percent = clickX / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function getStatusIcon(status) {
            switch(status) {
                case 'pending': return '⏳';
                case 'sent': return '✓';
                case 'delivered': return '✓✓';
                case 'read': return '✓✓';
                default: return '';
            }
        }

        function getStatusClass(status) {
            switch(status) {
                case 'pending': return 'status-pending';
                case 'sent': return 'status-sent';
                case 'delivered': return 'status-delivered';
                case 'read': return 'status-read';
                default: return '';
            }
        }

        // ========== Рендер сообщений ==========
        function renderMessages(animate = true) {
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            
            const oldScrollHeight = container.scrollHeight;
            const oldScrollTop = container.scrollTop;
            const isAtBottom = oldScrollHeight - oldScrollTop - container.clientHeight < 50;
            
            container.innerHTML = '';
            
            if (!currentChat) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 40px;">👈 Выберите чат</div>';
                return;
            }
            
            if (!messages[currentChat.id] || messages[currentChat.id].length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 40px;">Нет сообщений. Напишите что-нибудь!</div>';
                return;
            }
            
            messages[currentChat.id].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
            
            const fragment = document.createDocumentFragment();
            
            messages[currentChat.id].forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.type}`;
                if (!animate) messageDiv.style.animation = 'none';
                messageDiv.setAttribute('data-id', msg.id);
                
                let content = '';
                let statusHtml = '';
                
                const status = messageStatuses[msg.id] || { status: msg.sender === currentUser.id ? 'sent' : 'delivered' };
                
                if (msg.type === 'out') {
                    statusHtml = `<span class="message-status ${getStatusClass(status.status)}"><span class="status-icon">${getStatusIcon(status.status)}</span></span>`;
                }
                
                if (msg.text) {
                    content = `<div class="message-bubble">${escapeHtml(msg.text)}${msg.edited ? ' <span style="font-size: 10px; opacity: 0.7;">(ред.)</span>' : ''}</div>`;
                } else if (msg.audio) {
                    const messageId = msg.id;
                    const duration = msg.duration || 0;
                    
                    content = `
                        <div class="message-bubble audio-message">
                            <div class="audio-player">
                                <button class="play-pause-btn" data-message-id="${messageId}" onclick="window.toggleAudio('${messageId}', '${msg.audio}')">▶️</button>
                                <div class="audio-progress" onclick="window.seekAudio('${messageId}', event)">
                                    <div class="audio-progress-fill" data-message-id="${messageId}" style="width: 0%"></div>
                                </div>
                                <span class="audio-time" data-message-id="${messageId}">0:00/${formatTime(duration)}</span>
                            </div>
                        </div>
                    `;
                } else if (msg.media) {
                    if (msg.media.type.startsWith('image/')) {
                        content = `<img src="${msg.media.url}" class="message-media" onclick="window.openMedia('${msg.media.url}')">`;
                    } else if (msg.media.type.startsWith('video/')) {
                        content = `<video src="${msg.media.url}" class="message-media" controls onclick="event.stopPropagation()"></video>`;
                    }
                }
                
                let actions = '';
                if (msg.sender === currentUser.id || (currentUser && currentUser.isAdmin)) {
                    actions = `
                        <div class="message-actions">
                            ${msg.sender === currentUser.id ? `<button class="message-action-btn" onclick="window.editMessage('${msg.id}', event)">✏️</button>` : ''}
                            <button class="message-action-btn" onclick="window.deleteMessage('${msg.id}', event)">🗑️</button>
                        </div>
                    `;
                }
                
                const showAdminBadge = msg.isAdmin && msg.senderName === ADMIN_USERNAME;
                
                messageDiv.innerHTML = `
                    ${actions}
                    ${msg.type === 'in' ? `<div class="message-sender">${escapeHtml(msg.senderName)}${showAdminBadge ? ' <span class="admin-badge">ADMIN</span>' : ''}</div>` : ''}
                    ${content}
                    <div class="message-footer">
                        <span class="message-time">${msg.time}</span>
                        ${statusHtml}
                    </div>
                `;
                
                fragment.appendChild(messageDiv);
            });
            
            container.appendChild(fragment);
            
            if (isAtBottom) {
                container.scrollTo({
                    top: container.scrollHeight,
                    behavior: animate ? 'smooth' : 'auto'
                });
            }
            
            if (currentChat) {
                markMessagesAsRead(currentChat.id);
            }
        }

        // ========== Управление чатами и списком ==========
        function updateChatsList() {
            const list = document.getElementById('chatsList');
            if (!list) return;
            
            list.innerHTML = '';
            
            let items = [];
            
            if (currentTab === 'chats') {
                items = [...myChats].sort((a, b) => (b.lastMessageTime || 0) - (a.lastMessageTime || 0));
            } else if (currentTab === 'public') {
                items = publicChats;
            } else if (currentTab === 'users') {
                items = Object.values(onlineUsers);
            }
            
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                items = items.filter(item => 
                    (item.name || '').toLowerCase().includes(searchTerm) ||
                    (item.description || '').toLowerCase().includes(searchTerm) ||
                    (item.bio || '').toLowerCase().includes(searchTerm)
                );
            }
            
            if (items.length === 0) {
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">Ничего не найдено</div>';
                return;
            }
            
            items.forEach(item => {
                const element = document.createElement('div');
                element.className = `chat-item ${currentChat?.id === item.id ? 'active' : ''}`;
                
                if (currentTab === 'users') {
                    element.onclick = () => createPrivateChat(item);
                    
                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = item.name || '';
                    
                    const detailsDiv = document.createElement('div');
                    detailsDiv.className = 'chat-details';
                    
                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'chat-name';
                    nameDiv.appendChild(nameSpan);
                    
                    if (item.online) {
                        const onlineSpan = document.createElement('span');
                        onlineSpan.className = 'online-indicator';
                        nameDiv.appendChild(onlineSpan);
                    }
                    
                    if (item.dnd) {
                        const dndSpan = document.createElement('span');
                        dndSpan.className = 'dnd-badge';
                        dndSpan.textContent = 'DND';
                        nameDiv.appendChild(dndSpan);
                    }
                    
                    if (item.isAdmin && item.name === ADMIN_USERNAME) {
                        const adminSpan = document.createElement('span');
                        adminSpan.className = 'admin-badge';
                        adminSpan.textContent = 'ADMIN';
                        nameDiv.appendChild(adminSpan);
                    }
                    
                    const bioDiv = document.createElement('div');
                    bioDiv.className = 'chat-last-message';
                    bioDiv.textContent = item.bio || 'Нет информации';
                    
                    detailsDiv.appendChild(nameDiv);
                    detailsDiv.appendChild(bioDiv);
                    
                    element.innerHTML = `<div class="chat-avatar">${item.avatar || '👤'}</div>`;
                    element.appendChild(detailsDiv);
                } else {
                    const lastMsg = messages[item.id] && messages[item.id].length > 0 ? messages[item.id][messages[item.id].length - 1] : null;
                    const unread = unreadCounts[item.id] || 0;
                    
                    element.onclick = () => joinChat(item);
                    
                    const avatarDiv = document.createElement('div');
                    avatarDiv.className = 'chat-avatar';
                    avatarDiv.textContent = (item.name || '?').charAt(0);
                    
                    const detailsDiv = document.createElement('div');
                    detailsDiv.className = 'chat-details';
                    
                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'chat-name';
                    
                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = item.name || 'Без названия';
                    nameDiv.appendChild(nameSpan);
                    
                    if (item.password) {
                        const lockSpan = document.createElement('span');
                        lockSpan.className = 'lock-icon';
                        lockSpan.textContent = '🔒';
                        nameDiv.appendChild(lockSpan);
                    }
                    
                    if (currentUser && currentUser.isAdmin && currentUser.name === ADMIN_USERNAME && currentTab === 'public') {
                        const deleteBtn = document.createElement('button');
                        deleteBtn.className = 'delete-chat-btn';
                        deleteBtn.textContent = 'Удалить';
                        deleteBtn.onclick = (e) => {
                            e.stopPropagation();
                            deleteChat(item.id, e);
                        };
                        nameDiv.appendChild(deleteBtn);
                    }
                    
                    const lastMsgDiv = document.createElement('div');
                    lastMsgDiv.className = 'chat-last-message';
                    if (lastMsg) {
                        lastMsgDiv.textContent = lastMsg.text ? lastMsg.text : (lastMsg.audio ? '🎤 Голосовое сообщение' : '📷 Медиа');
                    } else {
                        lastMsgDiv.textContent = item.description || 'Нет сообщений';
                    }
                    
                    detailsDiv.appendChild(nameDiv);
                    detailsDiv.appendChild(lastMsgDiv);
                    
                    const metaDiv = document.createElement('div');
                    metaDiv.className = 'chat-meta';
                    
                    const timeDiv = document.createElement('div');
                    timeDiv.className = 'chat-time';
                    timeDiv.textContent = lastMsg ? lastMsg.time : '';
                    
                    metaDiv.appendChild(timeDiv);
                    
                    if (unread > 0) {
                        const unreadDiv = document.createElement('div');
                        unreadDiv.className = 'chat-unread';
                        unreadDiv.textContent = unread;
                        metaDiv.appendChild(unreadDiv);
                    }
                    
                    element.appendChild(avatarDiv);
                    element.appendChild(detailsDiv);
                    element.appendChild(metaDiv);
                }
                
                list.appendChild(element);
            });
        }

        function joinChat(chat) {
            if (!chat) return;
            
            if (chat.password && (!chat.members || !chat.members.includes(currentUser.id))) {
                pendingChatToJoin = chat;
                document.getElementById('joinChatTitle').textContent = `Введите пароль для "${chat.name}"`;
                document.getElementById('joinChatModal').classList.add('active');
                return;
            }
            
            if (!chat.members) chat.members = [];
            if (!chat.members.includes(currentUser.id)) chat.members.push(currentUser.id);
            
            if (!myChats.find(c => c.id === chat.id)) {
                myChats.push(chat);
                localStorage.setItem(`myChats_${currentUser.id}`, JSON.stringify(myChats));
                if (ably) subscribeToChat(chat);
            }
            
            currentChat = chat;
            updateUrlWithChat(chat);
            
            const titleElement = document.getElementById('currentChatName');
            titleElement.innerHTML = '';
            
            const nameSpan = document.createElement('span');
            nameSpan.textContent = chat.name;
            titleElement.appendChild(nameSpan);
            
            if (chat.password) {
                const lockSpan = document.createElement('span');
                lockSpan.textContent = ' 🔒';
                titleElement.appendChild(lockSpan);
            }
            
            if (currentUser && currentUser.isAdmin) {
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-chat-btn';
                deleteBtn.textContent = 'Удалить чат';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteChat(chat.id, e);
                };
                titleElement.appendChild(deleteBtn);
            }
            
            document.getElementById('chatStatus').textContent = chat.description || 'Чат';
            
            if (!messages[chat.id]) messages[chat.id] = [];
            messages[chat.id].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
            
            unreadCounts[chat.id] = 0;
            localStorage.setItem('unreadCounts', JSON.stringify(unreadCounts));
            
            renderMessages(true);
            updateChatsList();
            
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('active');
        }

        function createPrivateChat(user) {
            const chatId = [currentUser.id, user.id].sort().join('-');
            let privateChat = myChats.find(c => c.id === chatId);
            if (!privateChat) {
                privateChat = {
                    id: chatId,
                    name: user.name,
                    isPrivate: true,
                    user: user,
                    members: [currentUser.id, user.id]
                };
            }
            joinChat(privateChat);
        }

        function deleteChat(chatId, event) {
            if (event) event.stopPropagation();
            if (!currentUser || !currentUser.isAdmin) {
                alert('Только администратор может удалять чаты');
                return;
            }
            if (!confirm('Вы уверены, что хотите удалить этот чат? Это действие нельзя отменить.')) return;
            
            publicChats = publicChats.filter(c => c.id !== chatId);
            localStorage.setItem('publicChats', JSON.stringify(publicChats));
            myChats = myChats.filter(c => c.id !== chatId);
            localStorage.setItem(`myChats_${currentUser.id}`, JSON.stringify(myChats));
            if (messages[chatId]) {
                delete messages[chatId];
                saveMessagesDebounced();
            }
            if (ably) {
                const adminChannel = ably.channels.get('admin-actions');
                adminChannel.publish('delete-chat', { chatId, deletedBy: currentUser.id });
            }
            if (currentChat && currentChat.id === chatId) {
                currentChat = null;
                document.getElementById('messagesContainer').innerHTML = '<div class="chat-deleted-message">⚠️ Чат был удален администратором</div>';
                document.getElementById('currentChatName').innerHTML = 'Чат удален';
                document.getElementById('chatStatus').innerHTML = '';
                updateUrlWithChat(null);
            }
            updateChatsList();
        }

        function joinProtectedChat() {
            const password = document.getElementById('joinPasswordInput').value;
            if (pendingChatToJoin && password === pendingChatToJoin.password) {
                if (!pendingChatToJoin.members) pendingChatToJoin.members = [];
                pendingChatToJoin.members.push(currentUser.id);
                joinChat(pendingChatToJoin);
                closeJoinChatModal();
            } else {
                alert('Неверный пароль');
            }
        }

        function createPublicChat() {
            const name = document.getElementById('chatNameInput').value.trim();
            const password = document.getElementById('chatPasswordInput').value.trim();
            const description = document.getElementById('chatDescriptionInput').value.trim();
            if (!name) {
                alert('Введите название чата');
                return;
            }
            const newChat = {
                id: 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
                name: name,
                description: description || '',
                password: password || null,
                createdBy: currentUser.id,
                createdByName: currentUser.name,
                members: [currentUser.id],
                createdAt: new Date().toISOString()
            };
            publicChats.push(newChat);
            localStorage.setItem('publicChats', JSON.stringify(publicChats));
            if (ably) {
                const globalChatsChannel = ably.channels.get('global-chats');
                globalChatsChannel.publish('new-chat', newChat);
            }
            joinChat(newChat);
            closeCreateChatModal();
        }

        // ========== Редактирование/удаление сообщений ==========
        function deleteMessage(messageId, event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            if (!currentChat) return;
            const msg = messages[currentChat.id].find(m => m.id === messageId);
            if (!msg) return;
            if (!currentUser.isAdmin && msg.sender !== currentUser.id) {
                alert('Вы можете удалять только свои сообщения');
                return;
            }
            if (!confirm('Удалить сообщение?')) return;
            
            if (!deletedMessages[currentChat.id]) deletedMessages[currentChat.id] = [];
            if (!deletedMessages[currentChat.id].includes(messageId)) {
                deletedMessages[currentChat.id].push(messageId);
                localStorage.setItem('deletedMessages', JSON.stringify(deletedMessages));
            }
            
            messages[currentChat.id] = messages[currentChat.id].filter(m => m.id !== messageId);
            saveMessagesDebounced();
            
            if (ably) {
                const chatChannel = ably.channels.get(`chat-${currentChat.id}`);
                chatChannel.publish('delete', { messageId, senderId: currentUser.id, timestamp: Date.now() });
                if (currentUser.isAdmin) {
                    const adminChannel = ably.channels.get('admin-actions');
                    adminChannel.publish('delete-message', { chatId: currentChat.id, messageId, timestamp: Date.now() });
                }
            }
            
            renderMessages(true);
            updateChatsList();
        }

        function editMessage(messageId, event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            if (!currentChat) return;
            const msg = messages[currentChat.id].find(m => m.id === messageId);
            if (msg && msg.sender === currentUser.id) {
                messageToEdit = msg;
                document.getElementById('editMessageText').value = msg.text || '';
                document.getElementById('editMessageModal').classList.add('active');
            } else {
                alert('Вы можете редактировать только свои сообщения');
            }
        }

        function saveEditedMessage() {
            const newText = document.getElementById('editMessageText').value.trim();
            if (!newText || !messageToEdit || !currentChat) return;
            
            const msgIndex = messages[currentChat.id].findIndex(m => m.id === messageToEdit.id);
            if (msgIndex !== -1) {
                messages[currentChat.id][msgIndex].text = newText;
                messages[currentChat.id][msgIndex].edited = true;
                saveMessagesDebounced();
                
                if (ably) {
                    const chatChannel = ably.channels.get(`chat-${currentChat.id}`);
                    chatChannel.publish('edit', { messageId: messageToEdit.id, newText, timestamp: Date.now() });
                }
                
                renderMessages(true);
                closeEditMessageModal();
            }
        }

        // ========== Профиль и аватар ==========
        function openProfileModal() {
            document.getElementById('profileNameInput').value = currentUser.name;
            document.getElementById('profileBioInput').value = currentUser.bio || '';
            document.getElementById('profileDNDCheckbox').checked = currentUser.dnd || false;
            document.getElementById('profileAvatarLarge').textContent = currentUser.avatar || '👤';
            document.getElementById('profileModal').classList.add('active');
        }

        function closeProfileModal() {
            document.getElementById('profileModal').classList.remove('active');
        }

        async function saveProfile() {
            const newName = document.getElementById('profileNameInput').value.trim();
            const newBio = document.getElementById('profileBioInput').value.trim();
            const dnd = document.getElementById('profileDNDCheckbox').checked;
            
            try {
                const updates = {};
                
                if (newName && newName !== currentUser.name) {
                    const { data: existingUsers } = await supabase
                        .from('users')
                        .select('username')
                        .eq('username', newName)
                        .neq('id', currentUser.id);
                    
                    if (existingUsers && existingUsers.length > 0) {
                        alert('Пользователь с таким именем уже существует');
                        return;
                    }
                    
                    updates.username = newName;
                }
                
                if (newBio !== currentUser.bio) {
                    updates.bio = newBio;
                }
                
                if (dnd !== currentUser.dnd) {
                    updates.dnd = dnd;
                }
                
                if (Object.keys(updates).length > 0) {
                    const { error } = await supabase
                        .from('users')
                        .update(updates)
                        .eq('id', currentUser.id);
                    
                    if (error) throw error;
                }
                
                if (updates.username) currentUser.name = updates.username;
                if (updates.bio !== undefined) currentUser.bio = updates.bio;
                if (updates.dnd !== undefined) currentUser.dnd = updates.dnd;
                
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                if (ably) {
                    const presenceChannel = ably.channels.get('presence');
                    presenceChannel.presence.update({ 
                        name: currentUser.name, 
                        avatar: currentUser.avatar,
                        bio: currentUser.bio,
                        isAdmin: currentUser.isAdmin,
                        dnd: dnd
                    });
                }
                
                updateProfileUI();
                closeProfileModal();
            } catch (error) {
                console.error('Error saving profile:', error);
                alert('Ошибка при сохранении профиля');
            }
        }

        function openAvatarModal() {
            const grid = document.getElementById('avatarGrid');
            grid.innerHTML = '';
            weirdEmojis.forEach(emoji => {
                const div = document.createElement('div');
                div.className = 'avatar-option';
                div.textContent = emoji;
                div.onclick = () => selectAvatar(emoji, div);
                if (currentUser.avatar === emoji) div.classList.add('selected');
                grid.appendChild(div);
            });
            document.getElementById('avatarModal').classList.add('active');
        }

        let selectedAvatar = null;
        function selectAvatar(emoji, element) {
            document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selectedAvatar = emoji;
        }

        async function saveAvatar() {
            if (selectedAvatar) {
                try {
                    const { error } = await supabase
                        .from('users')
                        .update({ avatar: selectedAvatar })
                        .eq('id', currentUser.id);
                    
                    if (error) throw error;
                    
                    currentUser.avatar = selectedAvatar;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    updateProfileUI();
                    
                    if (ably) {
                        const presenceChannel = ably.channels.get('presence');
                        presenceChannel.presence.update({ 
                            name: currentUser.name, 
                            avatar: selectedAvatar,
                            bio: currentUser.bio,
                            isAdmin: currentUser.isAdmin,
                            dnd: currentUser.dnd
                        });
                    }
                } catch (error) {
                    console.error('Error saving avatar:', error);
                    alert('Ошибка при сохранении аватара');
                }
            }
            closeAvatarModal();
        }

        function closeAvatarModal() {
            document.getElementById('avatarModal').classList.remove('active');
            selectedAvatar = null;
        }

        // ========== Вспомогательные функции ==========
        function switchAuthMode(mode) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTabBtn');
            const registerTab = document.getElementById('registerTabBtn');
            if (mode === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                loginTab.className = 'auth-tab active';
                registerTab.className = 'auth-tab';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                loginTab.className = 'auth-tab';
                registerTab.className = 'auth-tab active';
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabChats').className = tab === 'chats' ? 'tab active' : 'tab';
            document.getElementById('tabPublic').className = tab === 'public' ? 'tab active' : 'tab';
            document.getElementById('tabUsers').className = tab === 'users' ? 'tab active' : 'tab';
            document.getElementById('searchInput').value = '';
            updateChatsList();
        }

        function handleSearch() {
            updateChatsList();
        }

        function openCreateChatModal() {
            document.getElementById('createChatModal').classList.add('active');
        }

        function closeCreateChatModal() {
            document.getElementById('createChatModal').classList.remove('active');
            document.getElementById('chatNameInput').value = '';
            document.getElementById('chatPasswordInput').value = '';
            document.getElementById('chatDescriptionInput').value = '';
        }

        function closeJoinChatModal() {
            document.getElementById('joinChatModal').classList.remove('active');
            document.getElementById('joinPasswordInput').value = '';
            pendingChatToJoin = null;
        }

        function closeEditMessageModal() {
            document.getElementById('editMessageModal').classList.remove('active');
            document.getElementById('editMessageText').value = '';
            messageToEdit = null;
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function toggleEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            picker.style.display = picker.style.display === 'none' ? 'flex' : 'none';
        }

        function addEmoji(emoji) {
            const input = document.getElementById('messageInput');
            const start = input.selectionStart;
            const end = input.selectionEnd;
            input.value = input.value.substring(0, start) + emoji + input.value.substring(end);
            input.focus();
            input.selectionStart = input.selectionEnd = start + emoji.length;
            input.style.height = 'auto';
            input.style.height = input.scrollHeight + 'px';
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function updateUrlWithChat(chat) {
            if (chat) {
                const newUrl = `${window.location.pathname}#${chat.id}`;
                window.history.pushState({ chatId: chat.id }, chat.name, newUrl);
                document.title = `${chat.name} - Ток`;
            } else {
                const newUrl = window.location.pathname;
                window.history.pushState({}, 'Ток', newUrl);
                document.title = 'Ток';
            }
        }

        function checkUrlForChat() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const chat = myChats.find(c => c.id === hash) || publicChats.find(c => c.id === hash);
                if (chat) setTimeout(() => joinChat(chat), 500);
            }
        }

        function openMedia(url) {
            const viewer = document.getElementById('mediaViewer');
            const content = document.getElementById('mediaViewerContent');
            if (url.match(/\.(mp4|webm|ogg)$/i) || url.includes('video')) {
                content.innerHTML = `<video src="${url}" controls autoplay></video>`;
            } else {
                content.innerHTML = `<img src="${url}" style="max-width: 100%; max-height: 100%;">`;
            }
            viewer.classList.add('active');
        }

        function closeMediaViewer() {
            document.getElementById('mediaViewer').classList.remove('active');
            document.getElementById('mediaViewerContent').innerHTML = '';
        }

        // Привязываем все функции к window
        window.login = login;
        window.register = register;
        window.logout = logout;
        window.switchAuthMode = switchAuthMode;
        window.togglePassword = togglePassword;
        window.switchTab = switchTab;
        window.handleSearch = handleSearch;
        window.openCreateChatModal = openCreateChatModal;
        window.closeCreateChatModal = closeCreateChatModal;
        window.createPublicChat = createPublicChat;
        window.closeJoinChatModal = closeJoinChatModal;
        window.joinProtectedChat = joinProtectedChat;
        window.sendMessage = sendMessage;
        window.toggleEmojiPicker = toggleEmojiPicker;
        window.handleKeyPress = handleKeyPress;
        window.handleInputFocus = handleInputFocus;
        window.handleInputBlur = handleInputBlur;
        window.handleMessagesContainerClick = handleMessagesContainerClick;
        window.openProfileModal = openProfileModal;
        window.closeProfileModal = closeProfileModal;
        window.saveProfile = saveProfile;
        window.openAvatarModal = openAvatarModal;
        window.closeAvatarModal = closeAvatarModal;
        window.saveAvatar = saveAvatar;
        window.toggleSidebar = toggleSidebar;
        window.closeEditMessageModal = closeEditMessageModal;
        window.saveEditedMessage = saveEditedMessage;
        window.editMessage = editMessage;
        window.deleteMessage = deleteMessage;
        window.openMedia = openMedia;
        window.closeMediaViewer = closeMediaViewer;
        window.toggleAudio = toggleAudio;
        window.seekAudio = seekAudio;

        // Обработчики событий
        window.addEventListener('popstate', function(event) {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const chat = myChats.find(c => c.id === hash) || publicChats.find(c => c.id === hash);
                if (chat) joinChat(chat);
            } else {
                currentChat = null;
                renderMessages();
                updateUrlWithChat(null);
            }
        });

        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        window.addEventListener('resize', function() {
            if (window.innerWidth > 768) document.getElementById('sidebar').classList.remove('active');
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeMediaViewer();
                if (document.activeElement === document.getElementById('messageInput')) {
                    document.getElementById('messageInput').blur();
                }
            }
        });

        document.addEventListener('click', function(e) {
            const emojiPicker = document.getElementById('emojiPicker');
            const emojiBtn = document.querySelector('.emoji-toggle-btn');
            if (emojiPicker.style.display === 'flex' && !emojiPicker.contains(e.target) && !emojiBtn.contains(e.target)) {
                emojiPicker.style.display = 'none';
            }
        });

        // Запуск инициализации
        init();
    </script>
</body>
</html>
